databaseChangeLog:
  - changeSet:
      id: 003-reservation-expiry
      author: shopverse
      changes:
        - addColumn:
            tableName: inventory_reservations
            columns:
              - column:
                  name: expires_at
                  type: TIMESTAMP(6)
        - update:
            tableName: inventory_reservations
            columns:
              - column:
                  name: expires_at
                  valueComputed: CURRENT_TIMESTAMP(6)
            where: expires_at IS NULL
        - addNotNullConstraint:
            tableName: inventory_reservations
            columnName: expires_at
            columnDataType: TIMESTAMP(6)
        - createIndex:
            tableName: inventory_reservations
            indexName: idx_inventory_reservation_expiry
            columns:
              - column:
                  name: status
              - column:
                  name: expires_at

  - changeSet:
