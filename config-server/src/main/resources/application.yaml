server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: CONFIG-SERVER
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_SEARCH_LOCATIONS:file:../cloud-configs,file:./cloud-configs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  include-application-name: false
  file:
    name: ${LOG_FILE:logs/${spring.application.name}.log}
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  structured:
    format:
      console: ${STRUCTURED_LOG_FORMAT:logstash}
      file: ${STRUCTURED_LOG_FORMAT:logstash}
    json:
      add:
        application: ${spring.application.name}
        environment: ${APP_ENVIRONMENT:local}
