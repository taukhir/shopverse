databaseChangeLog:
  - changeSet:
      id: 006-payment-failed-event-indexes
      author: shopverse
      changes:
        - createIndex:
            tableName: failed_kafka_events
            indexName: idx_payment_failed_replayed_failed_at
            columns:
              - column: { name: replayed }
              - column: { name: failed_at }
        - createIndex:
            tableName: failed_kafka_events
            indexName: idx_payment_failed_topic_replayed
            columns:
              - column: { name: source_topic }
              - column: { name: replayed }
