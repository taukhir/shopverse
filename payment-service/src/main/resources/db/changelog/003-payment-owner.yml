databaseChangeLog:
  - changeSet:
      id: 003-payment-owner
      author: shopverse
      changes:
        - addColumn:
            tableName: payments
            columns:
              - column:
                  name: customer_username
                  type: VARCHAR(100)
                  defaultValue: legacy-customer
                  constraints:
                    nullable: false
        - createIndex:
            tableName: payments
            indexName: idx_payments_customer_order
            columns:
              - column:
                  name: customer_username
              - column:
                  name: order_number

  - changeSet:
      id: 003-seed-demo-payments
      author: shopverse
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO payments
                (order_number, correlation_id, customer_username, amount, status,
                 payment_reference, failure_reason, created_at, updated_at)
              VALUES
