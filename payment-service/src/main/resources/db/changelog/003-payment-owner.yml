                 'DEMO-PAY-1001', NULL, '2026-06-15 09:00:04.000000', '2026-06-15 09:00:07.000000'),
                ('DEMO-ORD-1002', 'demo-corr-1002', 'customer1', 5299.00, 'DECLINED',
                 NULL, 'Demo provider declined the payment', '2026-06-15 10:00:04.000000', '2026-06-15 10:00:06.000000'),
                ('DEMO-ORD-1004', 'demo-corr-1004', 'customer2', 12999.00, 'TIMED_OUT',
                 NULL, 'Provider timeout; final outcome requires reconciliation', '2026-06-16 09:00:04.000000', '2026-06-16 09:00:05.000000'),
                ('DEMO-ORD-1006', 'demo-corr-1006', 'customer2', 12999.00, 'CAPTURED',
                 'DEMO-PAY-1006', NULL, '2026-06-17 09:00:04.000000', '2026-06-17 09:00:06.000000'),
                ('DEMO-ORD-1007', 'demo-corr-1007', 'customer1', 7798.00, 'CAPTURED',
