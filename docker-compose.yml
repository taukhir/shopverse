services:
  mysql:
    image: mysql:8.4
    container_name: shopverse-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-user_service}
      MYSQL_USER: ${MYSQL_USER:-ahmed}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shopverse

  mysql-bootstrap:
    image: mysql:8.4
    container_name: shopverse-mysql-bootstrap
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-ahmed}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    command: ["/bin/sh", "/scripts/01-create-service-databases.sh"]
    volumes:
      - ./docker/mysql/init:/scripts:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shopverse

  kafka:
    image: apache/kafka:3.9.1
    container_name: shopverse-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - shopverse

  minio:
    profiles: ["assets"]
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: shopverse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-shopverse-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - shopverse

  minio-init:
    profiles: ["assets"]
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    container_name: shopverse-minio-init
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/shopverse-product-images
        mc anonymous set download local/shopverse-product-images
        mc cp --recursive /seed-images/ local/shopverse-product-images/
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-shopverse-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - ./assets/products:/seed-images:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - shopverse

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    image: shopverse/config-server:local
    container_name: shopverse-config-server
    environment:
      SERVER_PORT: 8888
      JAVA_OPTS: ${CONFIG_SERVER_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SEARCH_LOCATIONS: file:/config
      LOG_FILE: /app/logs/config-server.log
      TRACING_SAMPLING_PROBABILITY: ${CONFIG_SERVER_TRACING_SAMPLING_PROBABILITY:-0.0}
    ports:
      - "8888:8888"
    volumes:
      - config-server-logs:/app/logs
      - ./cloud-configs:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - shopverse

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    image: shopverse/discovery-server:local
    container_name: shopverse-discovery-server
    environment:
      SERVER_PORT: 8761
      JAVA_OPTS: ${DISCOVERY_SERVER_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      LOG_FILE: /app/logs/discovery-server.log
      TRACING_SAMPLING_PROBABILITY: ${DISCOVERY_SERVER_TRACING_SAMPLING_PROBABILITY:-0.0}
    ports:
      - "8761:8761"
    volumes:
      - discovery-server-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - shopverse

  user-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: shopverse/user-service:local
    container_name: shopverse-user-service
    environment:
      SERVER_PORT: ${USER_SERVICE_PORT:-8082}
      JAVA_OPTS: ${USER_SERVICE_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_APPLICATION_NAME: ${USER_SERVICE_APP_NAME:-USER-SERVICE}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: ${USER_SERVICE_EUREKA_DEFAULT_ZONE:-http://discovery-server:8761/eureka}
      DB_URL: ${USER_SERVICE_DB_URL:-jdbc:mysql://mysql:3306/user_service?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
      DB_USERNAME: ${MYSQL_USER:-ahmed}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      DB_DRIVER: ${USER_SERVICE_DB_DRIVER:-com.mysql.cj.jdbc.Driver}
      DB_POOL_MAX_SIZE: ${USER_SERVICE_DB_POOL_MAX_SIZE:-4}
      DB_POOL_MIN_IDLE: ${USER_SERVICE_DB_POOL_MIN_IDLE:-1}
      JPA_DDL_AUTO: ${USER_SERVICE_JPA_DDL_AUTO:-none}
      JPA_SHOW_SQL: ${USER_SERVICE_JPA_SHOW_SQL:-false}
      HIBERNATE_FORMAT_SQL: ${USER_SERVICE_HIBERNATE_FORMAT_SQL:-false}
      USER_SERVICE_LIQUIBASE_ENABLED: ${USER_SERVICE_LIQUIBASE_ENABLED:-true}
      USER_SERVICE_LIQUIBASE_CHANGELOG: ${USER_SERVICE_LIQUIBASE_CHANGELOG:-classpath:db/changelog/db.changelog-master.yml}
      JWK_SET_URI: ${USER_SERVICE_JWK_SET_URI:-http://auth-service:8081/auth/.well-known/jwks.json}
      ZIPKIN_ENDPOINT: ${USER_SERVICE_ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      TRACING_SAMPLING_PROBABILITY: ${USER_SERVICE_TRACING_SAMPLING_PROBABILITY:-0.1}
      LOG_FILE: ${USER_SERVICE_LOG_FILE:-/app/logs/user-service.log}
      RATE_LIMIT_BURST_CAPACITY: ${USER_SERVICE_RATE_LIMIT_BURST_CAPACITY:-120}
      RATE_LIMIT_REFRESH_PERIOD: ${USER_SERVICE_RATE_LIMIT_REFRESH_PERIOD:-60s}
      RATE_LIMIT_TIMEOUT_DURATION: ${USER_SERVICE_RATE_LIMIT_TIMEOUT_DURATION:-0}
      BULKHEAD_MAX_CONCURRENT_REQUESTS: ${USER_SERVICE_BULKHEAD_MAX_CONCURRENT_REQUESTS:-100}
      BULKHEAD_MAX_WAIT_DURATION: ${USER_SERVICE_BULKHEAD_MAX_WAIT_DURATION:-0}
      LOOKUP_RETRY_MAX_ATTEMPTS: ${USER_SERVICE_LOOKUP_RETRY_MAX_ATTEMPTS:-3}
      LOOKUP_RETRY_WAIT_DURATION: ${USER_SERVICE_LOOKUP_RETRY_WAIT_DURATION:-100ms}
    ports:
      - "8082:8082"
    volumes:
      - user-service-logs:/app/logs
    depends_on:
      mysql-bootstrap:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  auth-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: shopverse/auth-service:local
    container_name: shopverse-auth-service
    environment:
      SERVER_PORT: 8081
      JAVA_OPTS: ${AUTH_SERVICE_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: ${AUTH_SERVICE_TRACING_SAMPLING_PROBABILITY:-0.1}
      RSA_PUBLIC_KEY: classpath:keys/public.pem
      RSA_PRIVATE_KEY: classpath:keys/private.pem
      LOG_FILE: /app/logs/auth-service.log
    ports:
      - "8081:8081"
    volumes:
      - auth-service-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  order-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: shopverse/order-service:local
    container_name: shopverse-order-service
    environment:
      SERVER_PORT: 8083
      JAVA_OPTS: ${ORDER_SERVICE_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: jdbc:mysql://mysql:3306/order_service?allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-ahmed}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      DB_POOL_MAX_SIZE: ${ORDER_SERVICE_DB_POOL_MAX_SIZE:-4}
      DB_POOL_MIN_IDLE: ${ORDER_SERVICE_DB_POOL_MIN_IDLE:-1}
      LOG_FILE: /app/logs/order-service.log
      TRACING_SAMPLING_PROBABILITY: ${ORDER_SERVICE_TRACING_SAMPLING_PROBABILITY:-0.1}
      KAFKA_LISTENER_CONCURRENCY: ${ORDER_SERVICE_KAFKA_LISTENER_CONCURRENCY:-1}
      KAFKA_CONSUMER_MAX_POLL_RECORDS: ${ORDER_SERVICE_KAFKA_CONSUMER_MAX_POLL_RECORDS:-25}
      OUTBOX_BATCH_SIZE: ${ORDER_SERVICE_OUTBOX_BATCH_SIZE:-25}
    ports:
      - "8083:8083"
    volumes:
      - order-service-logs:/app/logs
    depends_on:
      mysql-bootstrap:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  payment-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: shopverse/payment-service:local
    container_name: shopverse-payment-service
    environment:
      SERVER_PORT: 8084
      JAVA_OPTS: ${PAYMENT_SERVICE_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: jdbc:mysql://mysql:3306/payment_service?allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-ahmed}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      DB_POOL_MAX_SIZE: ${PAYMENT_SERVICE_DB_POOL_MAX_SIZE:-4}
      DB_POOL_MIN_IDLE: ${PAYMENT_SERVICE_DB_POOL_MIN_IDLE:-1}
      LOG_FILE: /app/logs/payment-service.log
      TRACING_SAMPLING_PROBABILITY: ${PAYMENT_SERVICE_TRACING_SAMPLING_PROBABILITY:-0.1}
      KAFKA_LISTENER_CONCURRENCY: ${PAYMENT_SERVICE_KAFKA_LISTENER_CONCURRENCY:-1}
      KAFKA_CONSUMER_MAX_POLL_RECORDS: ${PAYMENT_SERVICE_KAFKA_CONSUMER_MAX_POLL_RECORDS:-25}
      OUTBOX_BATCH_SIZE: ${PAYMENT_SERVICE_OUTBOX_BATCH_SIZE:-25}
    ports:
      - "8084:8084"
    volumes:
      - payment-service-logs:/app/logs
    depends_on:
      mysql-bootstrap:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  inventory-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    image: shopverse/inventory-service:local
    container_name: shopverse-inventory-service
    environment:
      SERVER_PORT: 8086
      JAVA_OPTS: ${INVENTORY_SERVICE_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: jdbc:mysql://mysql:3306/inventory_service?allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-ahmed}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      DB_POOL_MAX_SIZE: ${INVENTORY_SERVICE_DB_POOL_MAX_SIZE:-4}
      DB_POOL_MIN_IDLE: ${INVENTORY_SERVICE_DB_POOL_MIN_IDLE:-1}
      LOG_FILE: /app/logs/inventory-service.log
      TRACING_SAMPLING_PROBABILITY: ${INVENTORY_SERVICE_TRACING_SAMPLING_PROBABILITY:-0.1}
      KAFKA_LISTENER_CONCURRENCY: ${INVENTORY_SERVICE_KAFKA_LISTENER_CONCURRENCY:-1}
      KAFKA_CONSUMER_MAX_POLL_RECORDS: ${INVENTORY_SERVICE_KAFKA_CONSUMER_MAX_POLL_RECORDS:-25}
      OUTBOX_BATCH_SIZE: ${INVENTORY_SERVICE_OUTBOX_BATCH_SIZE:-25}
      INVENTORY_EXPIRY_SCAN_DELAY_MS: ${INVENTORY_SERVICE_EXPIRY_SCAN_DELAY_MS:-60000}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-shopverse-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "8086:8086"
    volumes:
      - inventory-service-logs:/app/logs
    depends_on:
      mysql-bootstrap:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  api-gateway:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: shopverse/api-gateway:local
    container_name: shopverse-api-gateway
    environment:
      SERVER_PORT: 8080
      JAVA_OPTS: ${API_GATEWAY_JAVA_OPTS:--XX:MaxRAMPercentage=60 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: ${API_GATEWAY_TRACING_SAMPLING_PROBABILITY:-0.1}
      SHOPVERSE_READINESS_MINIO_OBJECT_BASE_URL: http://minio:9000/shopverse-product-images
      LOG_FILE: /app/logs/api-gateway.log
    ports:
      - "8080:8080"
    volumes:
      - api-gateway-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.2.1
    container_name: shopverse-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-rules.yml:/etc/prometheus/rules/shopverse.yml:ro
      - prometheus-data:/prometheus
    networks:
      - shopverse

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.4.2
    container_name: shopverse-loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - shopverse

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.4.2
    container_name: shopverse-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./:/workspace:ro
      - api-gateway-logs:/service-logs/api-gateway:ro
      - order-service-logs:/service-logs/order-service:ro
      - payment-service-logs:/service-logs/payment-service:ro
      - inventory-service-logs:/service-logs/inventory-service:ro
      - user-service-logs:/service-logs/user-service:ro
      - auth-service-logs:/service-logs/auth-service:ro
      - discovery-server-logs:/service-logs/discovery-server:ro
      - config-server-logs:/service-logs/config-server:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - shopverse

  zipkin:
    image: openzipkin/zipkin:3.5
    container_name: shopverse-zipkin
    ports:
      - "9411:9411"
    networks:
      - shopverse

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.5.2
    container_name: shopverse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - shopverse

networks:
  shopverse:
    name: shopverse

volumes:
  mysql-data:
  minio-data:
  prometheus-data:
  loki-data:
  grafana-data:
  api-gateway-logs:
  order-service-logs:
  payment-service-logs:
  inventory-service-logs:
  user-service-logs:
  auth-service-logs:
  discovery-server-logs:
  config-server-logs:
