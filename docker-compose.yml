services:
  mysql:
    image: mysql:8.4
    container_name: shopverse-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-user_service}
      MYSQL_USER: ${MYSQL_USER:-ahmed}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Ahm3d@123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shopverse

  kafka:
    image: bitnami/kafka:3.9
    container_name: shopverse-kafka
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - shopverse

  config-server:
    build:
      context: ./config-server
    image: shopverse/config-server:local
    container_name: shopverse-config-server
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SEARCH_LOCATIONS: file:/config
      LOG_FILE: /app/logs/config-server.log
    ports:
      - "8888:8888"
    volumes:
      - config-server-logs:/app/logs
      - ./cloud-configs:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - shopverse

  discovery-server:
    build:
      context: ./discovery-server
    image: shopverse/discovery-server:local
    container_name: shopverse-discovery-server
    environment:
      SERVER_PORT: 8761
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      LOG_FILE: /app/logs/discovery-server.log
    ports:
      - "8761:8761"
    volumes:
      - discovery-server-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - shopverse

  user-service:
    build:
      context: ./user-service
    image: shopverse/user-service:local
    container_name: shopverse-user-service
    environment:
      SERVER_PORT: ${USER_SERVICE_PORT:-8082}
      SPRING_APPLICATION_NAME: ${USER_SERVICE_APP_NAME:-USER-SERVICE}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: ${USER_SERVICE_EUREKA_DEFAULT_ZONE:-http://discovery-server:8761/eureka}
      DB_URL: ${USER_SERVICE_DB_URL:-jdbc:mysql://mysql:3306/user_service?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
      DB_USERNAME: ${MYSQL_USER:-ahmed}
      DB_PASSWORD: ${MYSQL_PASSWORD:-Ahm3d@123}
      DB_DRIVER: ${USER_SERVICE_DB_DRIVER:-com.mysql.cj.jdbc.Driver}
      JPA_DDL_AUTO: ${USER_SERVICE_JPA_DDL_AUTO:-none}
      JPA_SHOW_SQL: ${USER_SERVICE_JPA_SHOW_SQL:-false}
      HIBERNATE_FORMAT_SQL: ${USER_SERVICE_HIBERNATE_FORMAT_SQL:-false}
      USER_SERVICE_LIQUIBASE_ENABLED: ${USER_SERVICE_LIQUIBASE_ENABLED:-true}
      USER_SERVICE_LIQUIBASE_CHANGELOG: ${USER_SERVICE_LIQUIBASE_CHANGELOG:-classpath:db/changelog/db.changelog-master.yml}
      JWK_SET_URI: ${USER_SERVICE_JWK_SET_URI:-http://auth-service:8081/auth/.well-known/jwks.json}
      ZIPKIN_ENDPOINT: ${USER_SERVICE_ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      LOG_FILE: ${USER_SERVICE_LOG_FILE:-/app/logs/user-service.log}
      RATE_LIMIT_BURST_CAPACITY: ${USER_SERVICE_RATE_LIMIT_BURST_CAPACITY:-120}
      RATE_LIMIT_REFRESH_PERIOD: ${USER_SERVICE_RATE_LIMIT_REFRESH_PERIOD:-60s}
      RATE_LIMIT_TIMEOUT_DURATION: ${USER_SERVICE_RATE_LIMIT_TIMEOUT_DURATION:-0}
      BULKHEAD_MAX_CONCURRENT_REQUESTS: ${USER_SERVICE_BULKHEAD_MAX_CONCURRENT_REQUESTS:-100}
      BULKHEAD_MAX_WAIT_DURATION: ${USER_SERVICE_BULKHEAD_MAX_WAIT_DURATION:-0}
      LOOKUP_RETRY_MAX_ATTEMPTS: ${USER_SERVICE_LOOKUP_RETRY_MAX_ATTEMPTS:-3}
      LOOKUP_RETRY_WAIT_DURATION: ${USER_SERVICE_LOOKUP_RETRY_WAIT_DURATION:-100ms}
    ports:
      - "8082:8082"
    volumes:
      - user-service-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  auth-service:
    build:
      context: ./auth-service
    image: shopverse/auth-service:local
    container_name: shopverse-auth-service
    environment:
      SERVER_PORT: 8081
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      RSA_PUBLIC_KEY: classpath:keys/public.pem
      RSA_PRIVATE_KEY: classpath:keys/private.pem
      LOG_FILE: /app/logs/auth-service.log
    ports:
      - "8081:8081"
    volumes:
      - auth-service-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  order-service:
    build:
      context: ./order-service
    image: shopverse/order-service:local
    container_name: shopverse-order-service
    environment:
      SERVER_PORT: 8083
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_FILE: /app/logs/order-service.log
    ports:
      - "8083:8083"
    volumes:
      - order-service-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  payment-service:
    build:
      context: ./payment-service
    image: shopverse/payment-service:local
    container_name: shopverse-payment-service
    environment:
      SERVER_PORT: 8084
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_FILE: /app/logs/payment-service.log
    ports:
      - "8084:8084"
    volumes:
      - payment-service-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  inventory-service:
    build:
      context: ./inventory-service
    image: shopverse/inventory-service:local
    container_name: shopverse-inventory-service
    environment:
      SERVER_PORT: 8086
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      JWK_SET_URI: http://auth-service:8081/auth/.well-known/jwks.json
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_FILE: /app/logs/inventory-service.log
    ports:
      - "8086:8086"
    volumes:
      - inventory-service-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  api-gateway:
    build:
      context: ./api-gateway
    image: shopverse/api-gateway:local
    container_name: shopverse-api-gateway
    environment:
      SERVER_PORT: 8080
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LOG_FILE: /app/logs/api-gateway.log
    ports:
      - "8080:8080"
    volumes:
      - api-gateway-logs:/app/logs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - shopverse

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: shopverse-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - shopverse

  loki:
    image: grafana/loki:3.4.2
    container_name: shopverse-loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - shopverse

  promtail:
    image: grafana/promtail:3.4.2
    container_name: shopverse-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./:/workspace:ro
      - api-gateway-logs:/service-logs/api-gateway:ro
      - order-service-logs:/service-logs/order-service:ro
      - payment-service-logs:/service-logs/payment-service:ro
      - inventory-service-logs:/service-logs/inventory-service:ro
      - user-service-logs:/service-logs/user-service:ro
      - auth-service-logs:/service-logs/auth-service:ro
      - discovery-server-logs:/service-logs/discovery-server:ro
      - config-server-logs:/service-logs/config-server:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - shopverse

  zipkin:
    image: openzipkin/zipkin:3.5
    container_name: shopverse-zipkin
    ports:
      - "9411:9411"
    networks:
      - shopverse

  grafana:
    image: grafana/grafana:11.5.2
    container_name: shopverse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - shopverse

networks:
  shopverse:
    name: shopverse

volumes:
  mysql-data:
  prometheus-data:
  loki-data:
  grafana-data:
  api-gateway-logs:
  order-service-logs:
  payment-service-logs:
  inventory-service-logs:
  user-service-logs:
  auth-service-logs:
  discovery-server-logs:
  config-server-logs:
