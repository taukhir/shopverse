<main class="auth-page">
  <a class="brand" routerLink="/"><img src="/shopverse-mark.svg" alt="" />shop<span>verse</span></a>

  <section>
    <p>MEMBER ACCESS</p>
    <h1>Welcome back.</h1>
    <span>Sign in to view your orders, continue checkout, and manage your account.</span>

    <form (ngSubmit)="submit()">
      <label>Username<input name="username" [(ngModel)]="username" autocomplete="username" required /></label>
      <label>Password<input name="password" [(ngModel)]="password" type="password" autocomplete="current-password" required /></label>
      @if (error()) {
        <div class="form-message error">{{ error() }}</div>
      }
      <button [disabled]="loading()">{{ loading() ? 'Signing in...' : 'Sign in' }} <b>&rarr;</b></button>
    </form>

    <small>Administrator accounts use the same sign-in form and open the operations workspace automatically.</small>
  </section>
</main>
