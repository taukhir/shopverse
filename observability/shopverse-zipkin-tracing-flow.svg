<svg width="1120" height="640" viewBox="0 0 1120 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="640" fill="#F8FAFC"/>
  <text x="560" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Zipkin Distributed Tracing In Shopverse</text>
  <text x="560" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4B5563">One request keeps the same traceId as it moves through Gateway and services</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#334155"/>
    </marker>
    <style>
      .box { fill:#FFFFFF; stroke:#CBD5E1; stroke-width:2; rx:14; }
      .client { fill:#ECFEFF; stroke:#0891B2; stroke-width:2; rx:14; }
      .svc { fill:#F0FDF4; stroke:#22C55E; stroke-width:2; rx:14; }
      .zipkin { fill:#FEF2F2; stroke:#EF4444; stroke-width:2; rx:14; }
      .log { fill:#FFF7ED; stroke:#F97316; stroke-width:2; rx:14; }
      .grafana { fill:#F5F3FF; stroke:#8B5CF6; stroke-width:2; rx:14; }
      .title { font-family:Arial, sans-serif; font-size:17px; font-weight:700; fill:#111827; }
      .body { font-family:Arial, sans-serif; font-size:13px; fill:#374151; }
      .small { font-family:Arial, sans-serif; font-size:12px; fill:#475569; }
      .label { font-family:Arial, sans-serif; font-size:12px; font-weight:700; fill:#334155; }
      .arrow { stroke:#334155; stroke-width:2.4; marker-end:url(#arrow); }
      .dash { stroke:#64748B; stroke-width:2.2; stroke-dasharray:7 6; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect x="48" y="144" width="150" height="88" class="client"/>
  <text x="123" y="178" text-anchor="middle" class="title">Client</text>
  <text x="78" y="208" class="body">HTTP request</text>

  <rect x="270" y="124" width="180" height="128" class="svc"/>
  <text x="360" y="158" text-anchor="middle" class="title">API Gateway</text>
  <text x="300" y="190" class="body">Creates or receives trace</text>
  <text x="300" y="212" class="body">spanId = gateway span</text>
  <text x="300" y="234" class="body">Forwards trace headers</text>

  <rect x="532" y="124" width="180" height="128" class="svc"/>
  <text x="622" y="158" text-anchor="middle" class="title">Order Service</text>
  <text x="562" y="190" class="body">Receives trace headers</text>
  <text x="562" y="212" class="body">same traceId</text>
  <text x="562" y="234" class="body">new service spanId</text>

  <rect x="794" y="124" width="180" height="128" class="svc"/>
  <text x="884" y="158" text-anchor="middle" class="title">User/Auth Service</text>
  <text x="824" y="190" class="body">Feign/internal calls</text>
  <text x="824" y="212" class="body">same traceId</text>
  <text x="824" y="234" class="body">child spans</text>

  <rect x="314" y="360" width="210" height="112" class="zipkin"/>
  <text x="419" y="394" text-anchor="middle" class="title">Zipkin</text>
  <text x="344" y="426" class="body">Receives spans from services</text>
  <text x="344" y="448" class="body">Shows request timeline</text>
  <text x="344" y="470" class="body">Finds slow/failing spans</text>

  <rect x="598" y="360" width="210" height="112" class="log"/>
  <text x="703" y="394" text-anchor="middle" class="title">Loki Logs</text>
  <text x="628" y="426" class="body">Stores logs with traceId</text>
  <text x="628" y="448" class="body">Query by traceId</text>
  <text x="628" y="470" class="body">Correlates with Zipkin</text>

  <rect x="874" y="360" width="170" height="112" class="grafana"/>
  <text x="959" y="394" text-anchor="middle" class="title">Grafana</text>
  <text x="904" y="426" class="body">Explore Loki logs</text>
  <text x="904" y="448" class="body">Open Zipkin trace</text>
  <text x="904" y="470" class="body">View metrics too</text>

  <rect x="78" y="368" width="170" height="94" class="box"/>
  <text x="163" y="402" text-anchor="middle" class="title">Log Pattern</text>
  <text x="105" y="434" class="body">[SERVICE,traceId,spanId]</text>
  <text x="105" y="456" class="body">same traceId per request</text>

  <path d="M198 188H270" class="arrow"/>
  <text x="214" y="176" class="label">request</text>

  <path d="M450 188H532" class="arrow"/>
  <text x="466" y="176" class="label">trace headers</text>

  <path d="M712 188H794" class="arrow"/>
  <text x="728" y="176" class="label">child call</text>

  <path d="M360 252V360" class="dash"/>
  <path d="M622 252C590 306 516 330 462 360" class="dash"/>
  <path d="M884 252C816 320 628 330 490 360" class="dash"/>
  <text x="452" y="326" class="label">spans exported to Zipkin</text>

  <path d="M360 252C408 318 536 338 598 392" class="dash"/>
  <path d="M622 252V360" class="dash"/>
  <path d="M884 252C832 312 772 340 738 360" class="dash"/>
  <text x="654" y="326" class="label">logs include traceId</text>

  <path d="M808 416H874" class="arrow"/>
  <text x="826" y="404" class="label">query</text>

  <path d="M524 416H598" class="arrow"/>
  <text x="540" y="404" class="label">copy traceId</text>

  <path d="M248 416H314" class="arrow"/>
  <text x="264" y="404" class="label">same id</text>

  <text x="560" y="552" text-anchor="middle" class="body">Example log correlation: [ORDER-SERVICE,4bf92f3577b34da6a3ce929d0e0e4736,00f067aa0ba902b7]</text>
  <text x="560" y="586" text-anchor="middle" class="small">Debug path: call API through Gateway -> open Zipkin trace -> copy traceId -> search Loki logs with {traceId="..."}</text>
</svg>
