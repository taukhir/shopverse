groups:
  - name: shopverse-slo-recording
    interval: 30s
    rules:
      - record: shopverse:http_requests:availability_5m
        expr: |
          1 - (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
          )
      - record: shopverse:http_requests:p95_seconds_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, application) (rate(http_server_requests_seconds_bucket[5m]))
          )
      - record: shopverse:checkout_failures:rate_5m
        expr: |
          sum(rate(shopverse_saga_transitions_total{stage=~"PAYMENT_FAILED|INVENTORY_REJECTED"}[5m]))

  - name: shopverse-alerts
    rules:
      - alert: ShopverseServiceDown
        expr: up{job="shopverse-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Shopverse service is unavailable"
          description: "{{ $labels.application }} has not been scraped successfully for two minutes."

      - alert: ShopverseHighServerErrorRate
        expr: shopverse:http_requests:availability_5m < 0.99
        for: 5m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Shopverse availability is below 99%"
          description: "Five-minute HTTP availability is {{ $value | humanizePercentage }}."

      - alert: ShopverseHighP95Latency
        expr: shopverse:http_requests:p95_seconds_5m > 1
        for: 5m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "Shopverse p95 latency exceeds one second"
          description: "{{ $labels.application }} p95 latency is {{ $value }} seconds."

      - alert: ShopverseOutboxPublishFailures
        expr: sum(increase(shopverse_outbox_publish_total{outcome="failed"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Transactional outbox publication is failing"
          description: "At least one outbox event failed to publish during the last five minutes."

      - alert: ShopverseDeadLetterEvents
        expr: sum(increase(shopverse_kafka_dlt_events_total[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Kafka events reached a dead-letter topic"
          description: "Inspect the service dead-letter admin API before replaying."
