services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: shopverse-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/rules/shopverse.yml:ro
      - prometheus-data:/prometheus
    networks:
      - shopverse-observability

  loki:
    image: grafana/loki:3.4.2
    container_name: shopverse-loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - shopverse-observability

  promtail:
    image: grafana/promtail:3.4.2
    container_name: shopverse-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../:/workspace:ro
    depends_on:
      - loki
    networks:
      - shopverse-observability

  zipkin:
    image: openzipkin/zipkin:3.5
    container_name: shopverse-zipkin
    ports:
      - "9411:9411"
    networks:
      - shopverse-observability

  grafana:
    image: grafana/grafana:11.5.2
    container_name: shopverse-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - zipkin
    networks:
      - shopverse-observability

networks:
  shopverse-observability:
    name: shopverse-observability

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
