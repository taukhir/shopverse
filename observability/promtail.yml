server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: shopverse-service-volume-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: shopverse-service-volume-files
          log_type: application
          __path__: /service-logs/*/*.log
          __path_exclude__: /service-logs/*/*-health.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: '"@timestamp"'
            level: level
            application: application
            traceId: traceId
            spanId: spanId
            correlationId: correlationId
            message: message
      - labels:
          level:
          application:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: local-service-log-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: shopverse-local-files
          log_type: application
          __path__: /workspace/*/logs/*.log
          __path_exclude__: /workspace/*/logs/*-health.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: '"@timestamp"'
            level: level
            application: application
            traceId: traceId
            spanId: spanId
            correlationId: correlationId
            message: message
      - labels:
          level:
          application:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: shopverse-health-log-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: shopverse-health-files
          log_type: health
          __path__: /service-logs/*/*-health.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: '"@timestamp"'
            level: level
            application: application
            traceId: traceId
            spanId: spanId
            correlationId: correlationId
            message: message
      - labels:
          level:
          application:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Application logs are collected from their dedicated JSON log volumes.
      # Keep Docker stdout collection for infrastructure containers only.
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: (api-gateway|auth-service|config-server|discovery-server|inventory-service|order-service|payment-service|user-service)
        action: drop
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_org_springframework_boot_application_name]
        target_label: application
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            timestamp: '"@timestamp"'
            level: level
            application: application
            traceId: traceId
            spanId: spanId
            correlationId: correlationId
            message: message
      - labels:
          level:
          application:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
