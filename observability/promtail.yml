server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: shopverse-service-volume-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: shopverse-service-volume-files
          __path__: /service-logs/*/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}T\S+)\s+(?P<level>\w+)\s+\[(?P<application>[^,\]]*),(?P<traceId>[^,\]]*),(?P<spanId>[^\]]*)\]\s+(?P<message>.*)$'
      - labels:
          level:
          application:
          traceId:
          spanId:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: local-service-log-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: shopverse-local-files
          __path__: /workspace/*/logs/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}T\S+)\s+(?P<level>\w+)\s+\[(?P<application>[^,\]]*),(?P<traceId>[^,\]]*),(?P<spanId>[^\]]*)\]\s+(?P<message>.*)$'
      - labels:
          level:
          application:
          traceId:
          spanId:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_org_springframework_boot_application_name]
        target_label: application
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}T\S+)\s+(?P<level>\w+)\s+\[(?P<application>[^,\]]*),(?P<traceId>[^,\]]*),(?P<spanId>[^\]]*)\]\s+(?P<message>.*)$'
      - labels:
          level:
          application:
          traceId:
          spanId:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
