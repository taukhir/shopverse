name: Shopverse Frontend Sites

on:
  push:
    branches:
      - master
    paths:
      - "shopverse-web/**"
      - "documentation/**"
      - "scripts/Test-ShopverseSites.ps1"
      - ".github/workflows/frontend-sites.yml"
  pull_request:
    paths:
      - "shopverse-web/**"
      - "documentation/**"
      - "scripts/Test-ShopverseSites.ps1"
      - ".github/workflows/frontend-sites.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-sites-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Angular and Docusaurus verification
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            shopverse-web/package-lock.json
            documentation/package-lock.json

      - name: Run frontend site automation
        shell: powershell
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass
          -File .\scripts\Test-ShopverseSites.ps1
          -Target All
          -Mode Quick
          -TimeoutMinutes 30
          -Install
