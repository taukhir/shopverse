name: Documentation Linux Visual Baselines

on:
  workflow_dispatch:
    inputs:
      update_baselines:
        description: Generate new Linux Chromium baselines
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: documentation
    env:
      VISUAL_REGRESSION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: documentation/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Compare or update Linux baselines
        run: npm run test:visual -- ${{ inputs.update_baselines && '--update-snapshots' || '' }}
      - name: Upload baseline or failure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-linux-visuals
          path: |
            documentation/tests/**/*-snapshots/**
            documentation/test-results/**
