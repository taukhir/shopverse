name: Shopverse Documentation

on:
  push:
    branches:
      - master
    paths:
      - "documentation/**"
      - ".github/workflows/docs-site.yml"
  pull_request:
    paths:
      - "documentation/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: shopverse-documentation
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: documentation/package-lock.json

      - name: Set up Java for executable documentation examples
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Resolve documentation validation mode
        id: validation
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "mode=changed" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "base=" >> "$GITHUB_OUTPUT"
          fi

      - name: Type-check configuration
        run: npm run typecheck

      - name: Validate titles, metadata, links, images, assets, and safety
        env:
          DOCS_CHECK_MODE: ${{ steps.validation.outputs.mode }}
          DOCS_BASE_SHA: ${{ steps.validation.outputs.base }}
        run: node scripts/validate-docs.mjs --${{ steps.validation.outputs.mode }}

      - name: Enforce documentation maintenance, structure, depth, and governance
        run: |
          npm run check:maintenance
          npm run check:docs:audit
          npm run check:docs:depth
          npm run check:docs:governance

      - name: Compile executable Java and Spring documentation examples
        run: |
          npm run check:java-labs
          npm run check:spring-labs

      - name: Build documentation
        run: npm run build

      - name: Crawl generated routes, assets, metadata, and anchors
        run: npm run check:built-site

      - name: Enforce performance budget
        run: npm run check:performance

      - name: Install browser for UI tests
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run changed-page rendering, responsive, image, Mermaid, and accessibility tests
        if: github.event_name == 'pull_request'
        env:
          DOCS_BASE_SHA: ${{ steps.validation.outputs.base }}
        run: npm run test:changed

      - name: Run Firefox and WebKit smoke tests
        if: github.event_name == 'pull_request'
        run: npm run test:cross-browser

      - name: Run full documentation UI and accessibility tests
        if: github.event_name != 'pull_request'
        run: npm run test:ui

      - name: Check official external references
        if: github.event_name == 'schedule'
        run: npm run check:docs:official-links

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-browser-failures
          path: documentation/test-results
          if-no-files-found: ignore

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/build

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4
