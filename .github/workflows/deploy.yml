name: Shopverse Deploy

on:
  workflow_run:
    workflows:
      - Shopverse CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: shopverse-deploy-production
  cancel-in-progress: false

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io

jobs:
  build-and-push-images:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: config-server
            dockerfile: config-server/Dockerfile
          - service: discovery-server
            dockerfile: discovery-server/Dockerfile
          - service: user-service
            dockerfile: user-service/Dockerfile
          - service: auth-service
            dockerfile: auth-service/Dockerfile
          - service: order-service
            dockerfile: order-service/Dockerfile
          - service: payment-service
            dockerfile: payment-service/Dockerfile
          - service: inventory-service
            dockerfile: inventory-service/Dockerfile
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image namespace
        id: vars
        shell: bash
        run: |
          image_namespace="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          source_sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "image_namespace=${image_namespace}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/${{ matrix.service }}:${{ steps.vars.outputs.source_sha }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_namespace }}/${{ matrix.service }}:latest

  deploy:
    name: Deploy to Docker host
    runs-on: ubuntu-latest
    needs: build-and-push-images
    if: ${{ vars.ENABLE_SSH_DEPLOY == 'true' }}
    environment: production
    steps:
      - name: Resolve deploy values
        id: vars
        shell: bash
        run: |
          image_namespace="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          else
            image_tag="${{ github.event.workflow_run.head_sha }}"
          fi

          echo "image_namespace=${image_namespace}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.vars.outputs.image_namespace }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_REGISTRY,IMAGE_NAMESPACE,IMAGE_TAG,GHCR_USERNAME,GHCR_READ_TOKEN,DEPLOY_PATH
          script: |
            set -e

            cd "$DEPLOY_PATH"
            git pull

            cat > .env.deploy <<EOF
            IMAGE_REGISTRY=$IMAGE_REGISTRY
            IMAGE_NAMESPACE=$IMAGE_NAMESPACE
            IMAGE_TAG=$IMAGE_TAG
            EOF

            if [ -n "$GHCR_READ_TOKEN" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose --env-file .env --env-file .env.deploy -f docker-compose.yml -f docker-compose.deploy.yml pull config-server discovery-server user-service auth-service order-service payment-service inventory-service api-gateway
            docker compose --env-file .env --env-file .env.deploy -f docker-compose.yml -f docker-compose.deploy.yml up -d
            docker compose --env-file .env --env-file .env.deploy -f docker-compose.yml -f docker-compose.deploy.yml ps
