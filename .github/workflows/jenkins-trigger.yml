name: Trigger Jenkins

on:
  workflow_run:
    workflows:
      - Shopverse CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to pass to Jenkins
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: shopverse-trigger-jenkins-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trigger-jenkins:
    name: Trigger Jenkins pipeline
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Jenkins build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB_PATH: ${{ secrets.JENKINS_JOB_PATH }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JENKINS_URL}" ] || [ -z "${JENKINS_JOB_PATH}" ]; then
            echo "JENKINS_URL and JENKINS_JOB_PATH secrets are required."
            exit 1
          fi

          if [ -z "${JENKINS_USER}" ] || [ -z "${JENKINS_API_TOKEN}" ]; then
            echo "JENKINS_USER and JENKINS_API_TOKEN secrets are required."
            exit 1
          fi

          image_tag="${IMAGE_TAG_INPUT:-${WORKFLOW_SHA:-${CURRENT_SHA}}}"
          crumb_header="$(curl -fsS -u "${JENKINS_USER}:${JENKINS_API_TOKEN}" "${JENKINS_URL%/}/crumbIssuer/api/json" \
            | jq -r '.crumbRequestField + ": " + .crumb')"

          curl -fsS -X POST \
            -u "${JENKINS_USER}:${JENKINS_API_TOKEN}" \
            -H "${crumb_header}" \
            --data-urlencode "IMAGE_TAG=${image_tag}" \
            --data-urlencode "BUILD_DOCKER_IMAGES=true" \
            --data-urlencode "RUN_COMPOSE_SMOKE_TEST=false" \
            "${JENKINS_URL%/}/${JENKINS_JOB_PATH#/}/buildWithParameters"
