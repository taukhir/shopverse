<svg width="1180" height="660" viewBox="0 0 1180 660" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1180" height="660" fill="#F8FAFC"/>
  <text x="590" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Shopverse Microservices Flow</text>
  <text x="590" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4B5563">Gateway, discovery, config, JWT security, observability, and data storage</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#334155"/>
    </marker>
    <style>
      .box { fill:#FFFFFF; stroke:#CBD5E1; stroke-width:2; rx:14; }
      .client { fill:#ECFEFF; stroke:#0891B2; stroke-width:2; rx:14; }
      .core { fill:#EEF2FF; stroke:#6366F1; stroke-width:2; rx:14; }
      .svc { fill:#F0FDF4; stroke:#22C55E; stroke-width:2; rx:14; }
      .sec { fill:#FEF2F2; stroke:#EF4444; stroke-width:2; rx:14; }
      .data { fill:#FFF7ED; stroke:#F97316; stroke-width:2; rx:14; }
      .obs { fill:#F5F3FF; stroke:#8B5CF6; stroke-width:2; rx:14; }
      .title { font-family:Arial, sans-serif; font-size:17px; font-weight:700; fill:#111827; }
      .body { font-family:Arial, sans-serif; font-size:13px; fill:#374151; }
      .small { font-family:Arial, sans-serif; font-size:12px; fill:#475569; }
      .label { font-family:Arial, sans-serif; font-size:12px; font-weight:700; fill:#334155; }
      .arrow { stroke:#334155; stroke-width:2.4; marker-end:url(#arrow); }
      .dash { stroke:#64748B; stroke-width:2.2; stroke-dasharray:7 6; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect x="48" y="178" width="160" height="90" class="client"/>
  <text x="128" y="212" text-anchor="middle" class="title">Client</text>
  <text x="78" y="242" class="body">Browser / Postman</text>

  <rect x="286" y="158" width="190" height="130" class="core"/>
  <text x="381" y="194" text-anchor="middle" class="title">API Gateway</text>
  <text x="316" y="226" class="body">Single entry point</text>
  <text x="316" y="248" class="body">Routes by path</text>
  <text x="316" y="270" class="body">Propagates trace context</text>

  <rect x="560" y="98" width="188" height="104" class="core"/>
  <text x="654" y="132" text-anchor="middle" class="title">Config Server</text>
  <text x="590" y="164" class="body">Serves YAML config</text>
  <text x="590" y="186" class="body">from cloud-configs/</text>

  <rect x="560" y="250" width="188" height="104" class="core"/>
  <text x="654" y="284" text-anchor="middle" class="title">Eureka</text>
  <text x="590" y="316" class="body">Service registry</text>
  <text x="590" y="338" class="body">Discovery by name</text>

  <rect x="830" y="96" width="210" height="108" class="sec"/>
  <text x="935" y="130" text-anchor="middle" class="title">Auth Service</text>
  <text x="858" y="162" class="body">Login</text>
  <text x="858" y="184" class="body">JWT signing + JWKS</text>

  <rect x="830" y="244" width="210" height="108" class="svc"/>
  <text x="935" y="278" text-anchor="middle" class="title">User Service</text>
  <text x="858" y="310" class="body">Users / roles / permissions</text>
  <text x="858" y="332" class="body">JWT resource server</text>

  <rect x="830" y="392" width="210" height="108" class="svc"/>
  <text x="935" y="426" text-anchor="middle" class="title">Order Service</text>
  <text x="858" y="458" class="body">Sample order APIs</text>
  <text x="858" y="480" class="body">Role-protected endpoints</text>

  <rect x="860" y="538" width="152" height="70" class="data"/>
  <text x="936" y="570" text-anchor="middle" class="title">MySQL</text>
  <text x="894" y="592" class="body">User data</text>

  <rect x="292" y="424" width="420" height="126" class="obs"/>
  <text x="502" y="458" text-anchor="middle" class="title">Observability Stack</text>
  <text x="324" y="490" class="body">Prometheus: metrics from /actuator/prometheus</text>
  <text x="324" y="512" class="body">Loki + Promtail: centralized logs</text>
  <text x="324" y="534" class="body">Zipkin: distributed traces</text>

  <path d="M208 223H286" class="arrow"/>
  <text x="224" y="211" class="label">HTTP</text>
  <path d="M476 190C510 165 526 150 560 150" class="dash"/>
  <text x="494" y="145" class="label">loads config</text>
  <path d="M476 245C510 273 526 302 560 302" class="dash"/>
  <text x="490" y="292" class="label">discovers</text>
  <path d="M476 216C600 160 704 150 830 150" class="arrow"/>
  <text x="614" y="150" class="label">/auth/**</text>
  <path d="M476 232C606 266 702 298 830 298" class="arrow"/>
  <text x="612" y="292" class="label">/api/v1/users/**</text>
  <path d="M476 250C610 330 704 446 830 446" class="arrow"/>
  <text x="604" y="382" class="label">/api/v1/orders/**</text>
  <path d="M935 204V244" class="arrow"/>
  <text x="950" y="228" class="label">Feign lookup</text>
  <path d="M935 352V538" class="arrow"/>
  <text x="954" y="455" class="label">JPA</text>
  <path d="M380 288V424" class="dash"/>
  <path d="M654 354V424" class="dash"/>
  <path d="M830 468C746 486 724 496 712 500" class="dash"/>
  <path d="M830 304C752 348 724 402 690 424" class="dash"/>
  <path d="M830 152C746 220 704 348 646 424" class="dash"/>
  <text x="520" y="402" class="label">logs + metrics + traces</text>
  <text x="590" y="636" text-anchor="middle" class="small">Config Server and Eureka support service startup/discovery; Gateway handles public traffic; services emit logs, metrics, and traces for Grafana dashboards.</text>
</svg>
