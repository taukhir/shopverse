<svg width="1120" height="680" viewBox="0 0 1120 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="680" fill="#F8FAFC"/>
  <text x="560" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Shopverse Observability Flow</text>
  <text x="560" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4B5563">Logs, metrics, traces, storage, and dashboards</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#374151"/>
    </marker>
    <style>
      .box { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; rx: 14; }
      .service { fill: #ECFEFF; stroke: #06B6D4; stroke-width: 2; rx: 14; }
      .collector { fill: #F0FDF4; stroke: #22C55E; stroke-width: 2; rx: 14; }
      .store { fill: #FFF7ED; stroke: #F97316; stroke-width: 2; rx: 14; }
      .ui { fill: #F5F3FF; stroke: #8B5CF6; stroke-width: 2; rx: 14; }
      .trace { fill: #FEF2F2; stroke: #EF4444; stroke-width: 2; rx: 14; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-family: Arial, sans-serif; font-size: 13px; fill: #374151; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #4B5563; }
      .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #374151; }
      .arrow { stroke: #374151; stroke-width: 2.5; marker-end: url(#arrow); }
      .dash { stroke: #64748B; stroke-width: 2.5; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="58" y="130" width="240" height="118" class="service"/>
  <text x="178" y="162" text-anchor="middle" class="title">Spring Boot Services</text>
  <text x="82" y="194" class="body">API Gateway</text>
  <text x="82" y="216" class="body">User, Auth, Order services</text>
  <text x="82" y="238" class="body">Config and Discovery servers</text>

  <rect x="58" y="310" width="240" height="116" class="box"/>
  <text x="178" y="342" text-anchor="middle" class="title">Service Output</text>
  <text x="82" y="374" class="body">Text logs with correlation</text>
  <text x="82" y="396" class="body">/actuator/prometheus metrics</text>
  <text x="82" y="418" class="body">Zipkin spans</text>

  <rect x="396" y="130" width="238" height="118" class="collector"/>
  <text x="515" y="162" text-anchor="middle" class="title">Promtail</text>
  <text x="420" y="194" class="body">Reads service log files</text>
  <text x="420" y="216" class="body">Reads Docker container logs</text>
  <text x="420" y="238" class="body">Extracts labels from log lines</text>

  <rect x="396" y="310" width="238" height="116" class="collector"/>
  <text x="515" y="342" text-anchor="middle" class="title">Prometheus</text>
  <text x="420" y="374" class="body">Scrapes Actuator metrics</text>
  <text x="420" y="396" class="body">Stores time-series metrics</text>
  <text x="420" y="418" class="body">Supports PromQL queries</text>

  <rect x="396" y="490" width="238" height="100" class="trace"/>
  <text x="515" y="522" text-anchor="middle" class="title">Zipkin</text>
  <text x="420" y="554" class="body">Stores distributed traces</text>
  <text x="420" y="576" class="body">Shows spans and timings</text>

  <rect x="762" y="130" width="238" height="118" class="store"/>
  <text x="881" y="162" text-anchor="middle" class="title">Loki</text>
  <text x="786" y="194" class="body">Stores centralized logs</text>
  <text x="786" y="216" class="body">Indexes labels, not full text</text>
  <text x="786" y="238" class="body">Keeps logs for 7 days</text>

  <rect x="762" y="310" width="238" height="116" class="ui"/>
  <text x="881" y="342" text-anchor="middle" class="title">Grafana</text>
  <text x="786" y="374" class="body">Dashboards and Explore UI</text>
  <text x="786" y="396" class="body">Queries Loki and Prometheus</text>
  <text x="786" y="418" class="body">Correlates logs and traces</text>

  <path d="M178 248V310" class="arrow"/>
  <text x="196" y="285" class="label">emits</text>

  <path d="M298 184H396" class="arrow"/>
  <text x="322" y="171" class="label">log files</text>

  <path d="M298 368H396" class="arrow"/>
  <text x="318" y="355" class="label">metrics</text>

  <path d="M298 420C338 490 350 540 396 540" class="dash"/>
  <text x="315" y="470" class="label">traces</text>

  <path d="M634 184H762" class="arrow"/>
  <text x="675" y="171" class="label">push logs</text>

  <path d="M634 368H762" class="arrow"/>
  <text x="660" y="355" class="label">query metrics</text>

  <path d="M881 248V310" class="arrow"/>
  <text x="900" y="285" class="label">query logs</text>

  <path d="M634 540C720 540 804 475 856 426" class="dash"/>
  <text x="728" y="514" class="label">query traces</text>

  <rect x="64" y="505" width="252" height="106" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" rx="14"/>
  <text x="190" y="535" text-anchor="middle" class="title">Correlation Labels</text>
  <text x="88" y="566" class="body">application = USER-SERVICE</text>
  <text x="88" y="588" class="body">traceId = same request journey</text>
  <text x="88" y="610" class="body">spanId = one operation/span</text>

  <text x="560" y="646" text-anchor="middle" class="small">Typical debug path: generate traffic -> check Grafana logs -> copy traceId -> open Zipkin trace -> inspect Prometheus metrics.</text>
</svg>
