databaseChangeLog:

  - changeSet:
      id: 015-bootstrap-admin-password
      author: tauqeer

      changes:

        - update:
            tableName: users
            columns:

              - column:
                  name: password
                  value: "{noop}Admin@123"

              - column:
                  name: status
                  value: ACTIVE

              - column:
                  name: account_non_locked
                  valueBoolean: true

              - column:
                  name: account_non_expired
                  valueBoolean: true

              - column:
                  name: credentials_non_expired
                  valueBoolean: true

              - column:
                  name: enabled
                  valueBoolean: true

              - column:
                  name: failed_login_attempts
                  valueNumeric: 0

            where: username = 'admin'
