databaseChangeLog:

  - changeSet:
      id: 014-seed-user-roles
      author: tauqeer

      changes:

        - sql:
            sql: |
              INSERT INTO user_roles(user_id, role_id)
              SELECT u.id, r.id
              FROM users u, roles r
              WHERE u.username = 'admin'
              AND r.role_name = 'ROLE_ADMIN';