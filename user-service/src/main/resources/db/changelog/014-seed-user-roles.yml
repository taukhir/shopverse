databaseChangeLog:

  - changeSet:
      id: 014-seed-user-roles
      author: tauqeer

      changes:

        - sql:
            sql: |
              INSERT INTO user_roles(user_id, role_id)
              SELECT u.id, r.id
              FROM users u, roles r
              WHERE u.username = 'admin'
              AND r.role_name = 'ROLE_ADMIN';

  - changeSet:
      id: 014-seed-demo-user-roles
      author: shopverse
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO user_roles(user_id, role_id)
              SELECT u.id, r.id
              FROM users u
              JOIN roles r ON
                   (u.username IN ('customer1', 'customer2') AND r.role_name = 'ROLE_CUSTOMER')
                OR (u.username = 'support1' AND r.role_name = 'ROLE_SUPPORT')
                OR (u.username = 'inventory1' AND r.role_name = 'ROLE_INVENTORY_MANAGER');
