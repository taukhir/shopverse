databaseChangeLog:

  - changeSet:
      id: 013-seed-admin-user
      author: tauqeer

      changes:

        - insert:
            tableName: users
            columns:

              - column:
                  name: uuid
                  value: admin-user-uuid

              - column:
                  name: username
                  value: admin

              - column:
                  name: email
                  value: admin@shopverse.com

              - column:
                  name: password
                  value: $2a$10$D0mM9LzQw0e3S3y4L7L7Ku...

              - column:
                  name: first_name
                  value: Super

              - column:
                  name: last_name
                  value: Admin

              - column:
                  name: status
                  value: ACTIVE

              - column:
                  name: account_non_locked
                  valueBoolean: true

              - column:
                  name: account_non_expired
                  valueBoolean: true

              - column:
                  name: credentials_non_expired
                  valueBoolean: true

              - column:
                  name: enabled
                  valueBoolean: true

              - column:
                  name: failed_login_attempts
                  valueNumeric: 0