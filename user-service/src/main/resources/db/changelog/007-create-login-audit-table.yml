databaseChangeLog:

  - changeSet:
      id: 007-create-login-audit-table
      author: tauqeer

      changes:

        - createTable:
            tableName: login_audit

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: login_time
                  type: TIMESTAMP

              - column:
                  name: ip_address
                  type: VARCHAR(100)

              - column:
                  name: user_agent
                  type: VARCHAR(500)

              - column:
                  name: login_status
                  type: VARCHAR(50)

              - column:
                  name: failure_reason
                  type: VARCHAR(255)

        - addForeignKeyConstraint:
            baseTableName: login_audit
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_login_audit_user