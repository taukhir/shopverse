databaseChangeLog:

  - changeSet:
      id: 016-create-user-addresses-table
      author: codex

      changes:

        - createTable:
            tableName: user_addresses

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: label
                  type: VARCHAR(60)
                  constraints:
                    nullable: false

              - column:
                  name: recipient_name
                  type: VARCHAR(160)
                  constraints:
                    nullable: false

              - column:
                  name: phone_number
                  type: VARCHAR(20)

              - column:
                  name: line1
                  type: VARCHAR(220)
                  constraints:
                    nullable: false

              - column:
                  name: line2
                  type: VARCHAR(220)

              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: state
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: postal_code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: country
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: created_by
                  type: VARCHAR(100)

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: VARCHAR(100)

              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0

        - addForeignKeyConstraint:
            baseTableName: user_addresses
            baseColumnNames: user_id
            constraintName: fk_user_addresses_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            tableName: user_addresses
            indexName: idx_user_addresses_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: user_addresses
            indexName: idx_user_addresses_user_default
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_default
