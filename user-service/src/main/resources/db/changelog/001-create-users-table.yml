databaseChangeLog:

  - changeSet:
      id: 001-create-users-table
      author: tauqeer

      changes:

        - createTable:
            tableName: users

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: uuid
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(100)

              - column:
                  name: last_name
                  type: VARCHAR(100)

              - column:
                  name: phone_number
                  type: VARCHAR(20)

              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: ACTIVE

              - column:
                  name: account_non_locked
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: account_non_expired
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: credentials_non_expired
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: failed_login_attempts
                  type: INT
                  defaultValueNumeric: 0

              - column:
                  name: last_login_at
                  type: TIMESTAMP

              - column:
                  name: password_changed_at
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: created_by
                  type: VARCHAR(100)

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_by
                  type: VARCHAR(100)

              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0