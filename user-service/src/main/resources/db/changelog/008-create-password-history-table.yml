databaseChangeLog:

  - changeSet:
      id: 008-create-password-history-table
      author: tauqeer

      changes:

        - createTable:
            tableName: password_history

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: password_hash
                  type: VARCHAR(255)

              - column:
                  name: changed_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: password_history
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_password_history_user