databaseChangeLog:

  - changeSet:
      id: 012-seed-role-permissions
      author: tauqeer

      changes:

        # ROLE_ADMIN -> ALL PERMISSIONS

        - sql:
            sql: |
              INSERT INTO role_permissions(role_id, permission_id)
              SELECT r.id, p.id
              FROM roles r, permissions p
              WHERE r.role_name = 'ROLE_ADMIN';

        # ROLE_CUSTOMER

        - sql:
            sql: |
              INSERT INTO role_permissions(role_id, permission_id)
              SELECT r.id, p.id
              FROM roles r, permissions p
              WHERE r.role_name = 'ROLE_CUSTOMER'
              AND p.permission_name IN (
                'ORDER_CREATE',
                'ORDER_READ',
                'PRODUCT_READ'
              );

        # ROLE_SUPPORT

        - sql:
            sql: |
              INSERT INTO role_permissions(role_id, permission_id)
              SELECT r.id, p.id
              FROM roles r, permissions p
              WHERE r.role_name = 'ROLE_SUPPORT'
              AND p.permission_name IN (
                'USER_READ',
                'ORDER_READ'
              );

        # ROLE_INVENTORY_MANAGER

        - sql:
            sql: |
              INSERT INTO role_permissions(role_id, permission_id)
              SELECT r.id, p.id
              FROM roles r, permissions p
              WHERE r.role_name = 'ROLE_INVENTORY_MANAGER'
              AND p.permission_name IN (
                'PRODUCT_READ',
                'PRODUCT_UPDATE'
              );