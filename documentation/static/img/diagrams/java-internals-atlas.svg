<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc"><title id="title">Java internals visual atlas</title><desc id="desc">Six panels show object layout, JIT tiers, garbage collection reachability, virtual thread mounting, HashMap buckets, and JMH phases.</desc><style>.bg{fill:#f8fafc}.p{fill:#fff;stroke:#334155;stroke-width:2}.x{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5}.g{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5}.y{fill:#fef3c7;stroke:#ca8a04;stroke-width:1.5}.r{fill:#fee2e2;stroke:#dc2626;stroke-width:1.5}.h{font:700 19px system-ui;fill:#0f172a}.t{font:14px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:2;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#475569"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="h" x="30" y="35">Advanced Java internals — six mental models</text>
<g transform="translate(30 65)"><rect class="p" width="420" height="230" rx="16"/><text class="h" x="20" y="35">1. Object layout (implementation-dependent)</text><rect class="x" x="25" y="65" width="100" height="120"/><text class="t" x="40" y="100">mark word</text><text class="t" x="40" y="130">class ptr</text><rect class="g" x="125" y="65" width="185" height="120"/><text class="t" x="155" y="120">instance fields</text><rect class="y" x="310" y="65" width="80" height="120"/><text class="t" x="325" y="120">padding</text></g>
<g transform="translate(490 65)"><rect class="p" width="420" height="230" rx="16"/><text class="h" x="20" y="35">2. Interpreter → tiered JIT</text><rect class="x" x="25" y="85" width="95" height="55" rx="8"/><text class="t" x="40" y="118">bytecode</text><rect class="y" x="160" y="85" width="100" height="55" rx="8"/><text class="t" x="175" y="118">profiles</text><rect class="g" x="300" y="85" width="95" height="55" rx="8"/><text class="t" x="315" y="118">JIT code</text><path class="a" d="M120 112H160"/><path class="a" d="M260 112H300"/><path class="a" d="M350 145C350 195 85 195 85 145"/><text class="t" x="145" y="190">deopt if assumptions fail</text></g>
<g transform="translate(950 65)"><rect class="p" width="420" height="230" rx="16"/><text class="h" x="20" y="35">3. GC reachability</text><circle class="x" cx="70" cy="115" r="38"/><text class="t" x="45" y="120">root</text><circle class="g" cx="190" cy="115" r="38"/><text class="t" x="170" y="120">live</text><circle class="r" cx="325" cy="165" r="38"/><text class="t" x="300" y="170">dead</text><path class="a" d="M108 115H152"/><text class="t" x="255" y="100">no path → reclaimable</text></g>
<g transform="translate(30 335)"><rect class="p" width="420" height="230" rx="16"/><text class="h" x="20" y="35">4. Virtual thread and carrier</text><rect class="x" x="25" y="75" width="110" height="55" rx="8"/><text class="t" x="45" y="108">virtual A</text><rect class="x" x="25" y="150" width="110" height="55" rx="8"/><text class="t" x="45" y="183">virtual B</text><rect class="g" x="280" y="105" width="110" height="70" rx="8"/><text class="t" x="303" y="135">carrier</text><text class="t" x="303" y="158">thread</text><path class="a" d="M135 102H280"/><path class="a" d="M135 178H280"/><text class="t" x="155" y="90">mount/unmount</text></g>
<g transform="translate(490 335)"><rect class="p" width="420" height="230" rx="16"/><text class="h" x="20" y="35">5. HashMap bucket evolution</text><rect class="x" x="25" y="75" width="70" height="55"/><text class="t" x="42" y="108">hash</text><circle class="y" cx="160" cy="102" r="30"/><circle class="y" cx="250" cy="102" r="30"/><circle class="g" cx="340" cy="70" r="25"/><circle class="g" cx="340" cy="145" r="25"/><path class="a" d="M95 102H130"/><path class="a" d="M190 102H220"/><path class="a" d="M280 102H315"/><text class="t" x="130" y="195">collision list may treeify at thresholds</text></g>
<g transform="translate(950 335)"><rect class="p" width="420" height="230" rx="16"/><text class="h" x="20" y="35">6. JMH measurement lifecycle</text><rect class="y" x="25" y="85" width="100" height="60"/><text class="t" x="45" y="120">fork</text><rect class="x" x="125" y="85" width="120" height="60"/><text class="t" x="150" y="120">warmup</text><rect class="g" x="245" y="85" width="145" height="60"/><text class="t" x="265" y="120">measurement</text><text class="t" x="55" y="190">repeat forks; report distribution and environment</text></g>
<g transform="translate(30 610)"><rect class="p" width="1340" height="220" rx="16"/><text class="h" x="20" y="40">Read these together</text><text class="t" x="20" y="80">Object layout and allocation affect GC. JIT can remove allocations or locks after profiling. Virtual threads change thread cost, not dependency capacity.</text><text class="t" x="20" y="115">Collection layout changes cache locality and contention. JMH isolates tiny code paths, while application load tests validate queues, I/O, GC and tail latency.</text><text class="t" x="20" y="165">Always verify with the deployed JDK, flags, workload and diagnostics; these diagrams are mental models, not byte-accurate promises.</text></g></svg>
