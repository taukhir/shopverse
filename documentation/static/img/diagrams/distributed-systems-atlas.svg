<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc"><title id="title">Distributed systems component visual atlas</title><desc id="desc">Twelve panels summarize load balancing, hashing, identifiers, limits, caching, queues, replication, sharding, CDN, search, real-time fan-out, and disaster recovery.</desc><style>.bg{fill:#f8fafc}.p{fill:#fff;stroke:#334155;stroke-width:2}.b{fill:#dbeafe;stroke:#2563eb}.g{fill:#dcfce7;stroke:#16a34a}.y{fill:#fef3c7;stroke:#ca8a04}.h{font:700 17px system-ui;fill:#0f172a}.t{font:12px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:2;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#475569"/></marker><g id="flow"><rect class="b" x="20" y="65" width="70" height="50" rx="7"/><rect class="y" x="125" y="55" width="75" height="70" rx="7"/><rect class="g" x="235" y="65" width="70" height="50" rx="7"/><path class="a" d="M90 90H125"/><path class="a" d="M200 90H235"/></g></defs><rect class="bg" width="1500" height="900"/><text class="h" x="25" y="35">Distributed-system building blocks — ownership, bounds and recovery</text>
<g transform="translate(25 60)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">1. Load balancing</text><use href="#flow"/><text class="t" x="20" y="165">health + algorithm + connection reuse</text><text class="t" x="20" y="190">bound retries and drain stale endpoints</text></g><g transform="translate(390 60)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">2. Consistent hashing</text><use href="#flow"/><text class="t" x="20" y="165">virtual nodes reduce movement</text><text class="t" x="20" y="190">they do not remove celebrity hot keys</text></g><g transform="translate(755 60)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">3. Distributed IDs</text><use href="#flow"/><text class="t" x="20" y="165">locality vs coordination vs opacity</text><text class="t" x="20" y="190">handle worker identity and clock rollback</text></g><g transform="translate(1120 60)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">4. Token bucket</text><use href="#flow"/><text class="t" x="20" y="165">burst capacity + refill rate</text><text class="t" x="20" y="190">distributed quota trades consistency/latency</text></g>
<g transform="translate(25 325)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">5. Cache-aside</text><use href="#flow"/><text class="t" x="20" y="165">miss → load → populate; define TTL/invalidation</text><text class="t" x="20" y="190">coalesce rebuilds and bound hot keys</text></g><g transform="translate(390 325)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">6. Queue visibility lease</text><use href="#flow"/><text class="t" x="20" y="165">work reappears after lease expiry</text><text class="t" x="20" y="190">effects remain idempotent and retry-bounded</text></g><g transform="translate(755 325)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">7. Leader and replicas</text><use href="#flow"/><text class="t" x="20" y="165">lag, fencing, promotion and repair</text><text class="t" x="20" y="190">a replica is not an independent backup</text></g><g transform="translate(1120 325)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">8. Shard routing</text><use href="#flow"/><text class="t" x="20" y="165">key, skew, rebalance, cross-shard work</text><text class="t" x="20" y="190">routing metadata needs versions/ownership</text></g>
<g transform="translate(25 590)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">9. CDN and object origin</text><use href="#flow"/><text class="t" x="20" y="165">cache key, TTL, purge and signed access</text><text class="t" x="20" y="190">origin shielding controls miss fan-out</text></g><g transform="translate(390 590)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">10. Search indexing</text><use href="#flow"/><text class="t" x="20" y="165">analyze → shard → refresh → query</text><text class="t" x="20" y="190">versioned index + alias enables rebuild</text></g><g transform="translate(755 590)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">11. Real-time fan-out</text><use href="#flow"/><text class="t" x="20" y="165">connection ownership, resume and ordering</text><text class="t" x="20" y="190">bound slow-client buffers and reconnects</text></g><g transform="translate(1120 590)"><rect class="p" width="335" height="225" rx="14"/><text class="h" x="18" y="32">12. Disaster recovery</text><use href="#flow"/><text class="t" x="20" y="165">RPO/RTO and dependency recovery order</text><text class="t" x="20" y="190">validate failover, reconciliation, failback</text></g></svg>
