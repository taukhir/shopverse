<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Keyword search versus vector search</title>
  <desc id="desc">Diagram comparing exact keyword matching with semantic vector search.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#fff;stroke:#1f2937;stroke-width:2;rx:14}
      .bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:10}
      .good{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:10}
      .query{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;fill:#111827}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:24px;fill:#111827;font-weight:700}
      .dot{fill:#4f46e5}
      .dot2{fill:#16a34a}
      .dot3{fill:#dc2626}
      .axis{stroke:#64748b;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="50" y="52">Keyword Search vs Vector Search</text>
  <text class="small" x="50" y="82">Vector search helps when the user and document use different words for the same meaning.</text>

  <rect class="panel" x="54" y="126" width="500" height="410"/>
  <text class="text" x="86" y="166" font-weight="700">Keyword search</text>
  <rect class="query" x="86" y="200" width="408" height="62"/>
  <text class="small" x="110" y="237">User: Can I send back a broken item?</text>
  <rect class="bad" x="86" y="304" width="408" height="78"/>
  <text class="small" x="110" y="336">Document: Defective products may be returned</text>
  <text class="small" x="110" y="360">within 7 days.</text>
  <text class="small" x="86" y="432">Problem: exact words may not match. The document says</text>
  <text class="small" x="86" y="456">defective, but the user says broken.</text>

  <rect class="panel" x="646" y="126" width="500" height="410"/>
  <text class="text" x="678" y="166" font-weight="700">Vector search</text>
  <line class="axis" x1="720" y1="462" x2="1060" y2="462"/>
  <line class="axis" x1="720" y1="462" x2="720" y2="232"/>
  <circle class="dot" cx="806" cy="318" r="13"/>
  <circle class="dot2" cx="842" cy="344" r="13"/>
  <circle class="dot3" cx="1018" cy="250" r="13"/>
  <circle class="dot3" cx="968" cy="432" r="13"/>
  <text class="small" x="828" y="310">broken item</text>
  <text class="small" x="866" y="352">defective product return</text>
  <text class="small" x="984" y="236">gaming laptop</text>
  <text class="small" x="930" y="420">shipping days</text>
  <text class="small" x="678" y="510">Similar meanings are nearby in vector space, so the</text>
  <text class="small" x="678" y="534">right policy chunk can be retrieved.</text>
</svg>
