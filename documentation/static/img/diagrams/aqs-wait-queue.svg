<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc"><title id="title">AQS synchronization state and wait queue</title><desc id="desc">An owning thread controls synchronizer state while queued nodes park and are signalled to retry acquisition.</desc><style>.bg{fill:#f8fafc}.state{fill:#dcfce7;stroke:#15803d;stroke-width:2}.node{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.park{fill:#fef3c7;stroke:#a16207;stroke-width:2}.h{font:700 20px system-ui;fill:#0f172a}.p{font:14px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="520"/><text class="h" x="35" y="42">AQS: atomic synchronizer state plus a queue of contenders</text><rect class="state" x="50" y="100" width="300" height="140" rx="18"/><text class="h" x="90" y="140">Synchronizer state = 1</text><text class="p" x="90" y="175">Owner: Thread A</text><text class="p" x="90" y="205">tryRelease() changes state</text><rect class="node" x="470" y="110" width="180" height="110" rx="16"/><text class="h" x="510" y="150">Head node</text><text class="p" x="505" y="182">Thread B retries</text><rect class="park" x="720" y="110" width="180" height="110" rx="16"/><text class="h" x="760" y="150">Node C</text><text class="p" x="755" y="182">parked / waiting</text><rect class="park" x="970" y="110" width="180" height="110" rx="16"/><text class="h" x="1010" y="150">Node D</text><text class="p" x="1005" y="182">parked / waiting</text><path class="a" d="M650 165H720"/><path class="a" d="M900 165H970"/><path class="a" d="M350 170H470"/><text class="p" x="370" y="150">release signals</text><path class="a" d="M560 220C560 350 260 350 200 240"/><text class="p" x="340" y="330">tryAcquire() CAS succeeds or re-parks</text><text class="p" x="50" y="440">AQS supplies queueing and parking; each synchronizer defines its state rules.</text></svg>
