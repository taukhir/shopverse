<svg width="1120" height="660" viewBox="0 0 1120 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zipkin Distributed Tracing In Shopverse</title>
  <desc id="desc">A tracing diagram showing trace ID propagation across Gateway, Order Service, Feign calls, Kafka processing, Zipkin, and Loki.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
    .boxTitle { font: 700 16px Arial, sans-serif; fill: #0f172a; }
    .boxText { font: 400 12.5px Arial, sans-serif; fill: #475569; }
    .label { font: 700 12px Arial, sans-serif; fill: #334155; }
    .traceLabel { font: 700 12px Arial, sans-serif; fill: #7f1d1d; }
    .client { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.6; rx: 16; }
    .svc { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.6; rx: 16; }
    .async { fill: #fffbeb; stroke: #d97706; stroke-width: 1.6; rx: 16; }
    .trace { fill: #fff1f2; stroke: #ef4444; stroke-width: 1.6; rx: 16; }
    .logs { fill: #fff7ed; stroke: #f97316; stroke-width: 1.6; rx: 16; }
    .ui { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.6; rx: 16; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .span { stroke: #ef4444; stroke-width: 2.2; fill: none; stroke-dasharray: 7 7; marker-end: url(#traceArrow); }
    .logLine { stroke: #f97316; stroke-width: 2.1; fill: none; stroke-dasharray: 6 7; marker-end: url(#logArrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="traceArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="logArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="660"/>
  <text x="560" y="48" text-anchor="middle" class="title">Zipkin Distributed Tracing In Shopverse</text>
  <text x="560" y="76" text-anchor="middle" class="subtitle">Micrometer propagates trace context; Shopverse separately carries correlation ID for the business journey</text>

  <rect x="62" y="142" width="142" height="80" class="client"/>
  <text x="133" y="174" text-anchor="middle" class="boxTitle">Client</text>
  <text x="133" y="198" text-anchor="middle" class="boxText">HTTP request</text>

  <rect x="276" y="126" width="170" height="112" class="svc"/>
  <text x="361" y="156" text-anchor="middle" class="boxTitle">API Gateway</text>
  <text x="306" y="184" class="boxText">server span</text>
  <text x="306" y="204" class="boxText">adds trace headers</text>
  <text x="306" y="224" class="boxText">adds correlation ID</text>

  <rect x="520" y="126" width="170" height="112" class="svc"/>
  <text x="605" y="156" text-anchor="middle" class="boxTitle">Order Service</text>
  <text x="550" y="184" class="boxText">same traceId</text>
  <text x="550" y="204" class="boxText">new spanId</text>
  <text x="550" y="224" class="boxText">checkout logs</text>

  <rect x="764" y="126" width="170" height="112" class="svc"/>
  <text x="849" y="156" text-anchor="middle" class="boxTitle">Feign / Service</text>
  <text x="794" y="184" class="boxText">traceparent forwarded</text>
  <text x="794" y="204" class="boxText">X-Correlation-Id</text>
  <text x="794" y="224" class="boxText">child service span</text>

  <path d="M204 182 H276" class="arrow"/>
  <text x="218" y="170" class="label">request</text>
  <path d="M446 182 H520" class="arrow"/>
  <text x="458" y="170" class="label">trace headers</text>
  <path d="M690 182 H764" class="arrow"/>
  <text x="704" y="170" class="label">Feign call</text>

  <rect x="142" y="318" width="210" height="96" class="async"/>
  <text x="247" y="350" text-anchor="middle" class="boxTitle">Kafka SAGA Event</text>
  <text x="172" y="378" class="boxText">correlationId in payload</text>
  <text x="172" y="398" class="boxText">new trace may start later</text>

  <rect x="454" y="318" width="210" height="96" class="trace"/>
  <text x="559" y="350" text-anchor="middle" class="boxTitle">Zipkin</text>
  <text x="484" y="378" class="boxText">stores spans and timing</text>
  <text x="484" y="398" class="boxText">shows technical call tree</text>

  <rect x="750" y="318" width="210" height="96" class="logs"/>
  <text x="855" y="350" text-anchor="middle" class="boxTitle">Loki Logs</text>
  <text x="780" y="378" class="boxText">logs include traceId</text>
  <text x="780" y="398" class="boxText">and correlationId</text>

  <rect x="454" y="498" width="210" height="86" class="ui"/>
  <text x="559" y="530" text-anchor="middle" class="boxTitle">Grafana Explore</text>
  <text x="484" y="558" class="boxText">query logs, metrics, traces</text>

  <path d="M605 238 C558 286 420 310 352 340" class="arrow"/>
  <text x="418" y="292" class="label">async event</text>

  <path d="M361 238 C394 274 444 302 500 318" class="span"/>
  <path d="M605 238 V318" class="span"/>
  <path d="M849 238 C780 292 700 310 620 318" class="span"/>
  <text x="468" y="282" class="traceLabel">spans exported</text>

  <path d="M361 238 C475 292 650 305 750 350" class="logLine"/>
  <path d="M605 238 C650 280 734 300 812 318" class="logLine"/>
  <path d="M849 238 V318" class="logLine"/>
  <text x="686" y="286" class="label">logs indexed by time and fields</text>

  <path d="M559 414 V498" class="arrow"/>
  <path d="M855 414 C780 470 680 506 664 520" class="arrow"/>
  <text x="710" y="488" class="label">copy traceId or correlationId</text>

  <rect x="76" y="500" width="250" height="84" class="client"/>
  <text x="201" y="530" text-anchor="middle" class="boxTitle">Identifier Rule</text>
  <text x="106" y="558" class="boxText">traceId = one technical trace</text>
  <text x="106" y="578" class="boxText">correlationId = whole business flow</text>

  <text x="560" y="626" text-anchor="middle" class="boxText">Search Zipkin by trace ID for latency. Search Loki by correlation ID for the complete checkout or SAGA journey.</text>
</svg>
