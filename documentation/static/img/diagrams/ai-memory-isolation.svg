<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Memory isolation</title><desc id="desc">Safe AI chat memory is isolated by tenant, user, and conversation.</desc>
  <style>.bg{fill:#fbfbf9}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12}.good{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}.b{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.s{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151}</style>
  <rect class="bg" width="1200" height="640"/><text class="h" x="50" y="55">Secure Chat Memory Isolation</text><text class="s" x="50" y="84">Never share AI memory across users. Use tenant + user + conversation as the memory key.</text>
  <rect class="bad" x="80" y="150" width="460" height="360"/><text class="t" x="115" y="190">Bad: Shared Memory Key</text><rect class="b" x="125" y="235" width="360" height="70"/><text class="s" x="155" y="276">memoryKey = "support-chat"</text><rect class="b" x="125" y="340" width="360" height="90"/><text class="s" x="155" y="374">User A order details</text><text class="s" x="155" y="404">can leak into User B chat</text>
  <rect class="good" x="660" y="150" width="460" height="360"/><text class="t" x="695" y="190">Good: Scoped Memory Key</text><rect class="b" x="705" y="235" width="360" height="70"/><text class="s" x="735" y="276">tenant:user:conversation</text><rect class="b" x="705" y="340" width="360" height="90"/><text class="s" x="735" y="374">User A and User B have</text><text class="s" x="735" y="404">separate memory windows</text>
</svg>
