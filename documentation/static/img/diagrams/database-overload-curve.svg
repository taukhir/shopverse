<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc"><title id="title">Database throughput and latency under increasing concurrency</title><desc id="desc">Throughput rises then plateaus while latency accelerates after the database saturation knee.</desc><style>.bg{fill:#f8fafc}.axis{stroke:#334155;stroke-width:3}.through{stroke:#2563eb;stroke-width:5;fill:none}.lat{stroke:#dc2626;stroke-width:5;fill:none}.bound{stroke:#16a34a;stroke-width:3;stroke-dasharray:10 8}.h{font:700 20px system-ui;fill:#0f172a}.p{font:15px system-ui;fill:#334155}.blue{fill:#2563eb}.red{fill:#dc2626}.green{fill:#15803d}</style><rect class="bg" width="1200" height="620"/><text class="h" x="35" y="42">Database concurrency has a saturation knee</text><line class="axis" x1="100" y1="520" x2="1110" y2="520"/><line class="axis" x1="100" y1="520" x2="100" y2="90"/><text class="p" x="480" y="570">Concurrent database work / active connections</text><text class="p" transform="translate(35 380) rotate(-90)">Throughput and response time</text><path class="through" d="M110 500C250 430 360 330 520 250C650 190 760 175 1080 170"/><path class="lat" d="M110 500C400 490 590 465 700 410C820 350 900 240 1080 95"/><line class="bound" x1="680" y1="100" x2="680" y2="520"/><text class="h green" x="535" y="125">admission limit</text><text class="p green" x="525" y="150">operate before the knee</text><text class="h blue" x="900" y="195">throughput plateaus</text><text class="h red" x="850" y="330">queueing/locks rise</text><text class="p" x="750" y="460">More replicas or connections now increase p95/p99 without proportional throughput.</text></svg>
