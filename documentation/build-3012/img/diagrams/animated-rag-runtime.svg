<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Animated RAG runtime flow</title><desc id="desc">Animated runtime flow from user question to retrieval, prompt, LLM answer.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#16a34a"/></marker><style>.bg{fill:#fbfbf9}.b{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.db{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.m{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.s{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}.l{stroke:#16a34a;stroke-width:3;fill:none;marker-end:url(#a)}.dot{fill:#16a34a}</style></defs>
  <rect class="bg" width="1200" height="560"/><text class="h" x="50" y="55">Animated RAG Runtime</text><text class="s" x="50" y="84">Every user question triggers retrieval before generation.</text>
  <rect class="b" x="60" y="230" width="170" height="80"/><text class="t" x="110" y="263">Question</text>
  <rect class="m" x="300" y="230" width="170" height="80"/><text class="t" x="342" y="263">Embed</text>
  <rect class="db" x="540" y="230" width="170" height="80"/><text class="t" x="580" y="263">Retrieve</text>
  <rect class="b" x="780" y="230" width="170" height="80"/><text class="t" x="828" y="263">Prompt</text>
  <rect class="m" x="1020" y="230" width="140" height="80"/><text class="t" x="1070" y="263">LLM</text>
  <rect class="b" x="780" y="410" width="170" height="80"/><text class="t" x="828" y="443">Answer</text>
  <path class="l" d="M230 270 L300 270"/><path class="l" d="M470 270 L540 270"/><path class="l" d="M710 270 L780 270"/><path class="l" d="M950 270 L1020 270"/><path class="l" d="M1090 310 C1090 400 965 450 950 450"/>
  <circle class="dot" r="9"><animateMotion dur="5s" repeatCount="indefinite" path="M145 270 L385 270 L625 270 L865 270 L1090 270 C1090 400 965 450 865 450"/></circle>
</svg>
