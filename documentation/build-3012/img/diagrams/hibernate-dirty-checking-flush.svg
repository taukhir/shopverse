<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc"><title id="title">Hibernate persistence context dirty checking and flush</title><desc id="desc">Managed entities and snapshots are compared, changes become queued actions, flush sends ordered SQL through JDBC, and commit remains a separate database transaction event.</desc><defs><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.amber{fill:#fef3c7;stroke:#d97706}.t{font:19px sans-serif;fill:#0f172a}.h{font:bold 24px sans-serif;fill:#0f172a}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="500" rx="18"/><text class="h" x="40" y="48">Persistence context = identity map + unit of work</text><rect class="b blue" x="40" y="90" width="260" height="120" rx="12"/><text class="h" x="70" y="130">Managed entity</text><text class="t" x="70" y="168">current field state</text><text class="t" x="70" y="195">one identity per id</text><rect class="b" x="40" y="285" width="260" height="105" rx="12"/><text class="h" x="70" y="325">Snapshot</text><text class="t" x="70" y="362">loaded/original state</text><path class="a" d="M300 150h100"/><path class="a" d="M300 337l100-150"/><rect class="b amber" x="400" y="110" width="250" height="120" rx="12"/><text class="h" x="430" y="150">Dirty checking</text><text class="t" x="430" y="188">compare or enhanced</text><text class="t" x="430" y="215">change tracking</text><path class="a" d="M650 170h70"/><rect class="b" x="720" y="110" width="210" height="120" rx="12"/><text class="h" x="748" y="150">Action queue</text><text class="t" x="748" y="188">insert / update</text><text class="t" x="748" y="215">delete / collection</text><path class="a" d="M930 170h55"/><rect class="b green" x="985" y="110" width="175" height="120" rx="12"/><text class="h" x="1025" y="150">flush</text><text class="t" x="1012" y="188">ordered SQL</text><text class="t" x="1012" y="215">via JDBC</text><path class="a" d="M1072 230v90"/><rect class="b blue" x="845" y="320" width="315" height="105" rx="12"/><text class="h" x="885" y="360">Database transaction</text><text class="t" x="875" y="397">flush ≠ commit; failure may occur at either</text></svg>
