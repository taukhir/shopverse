<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc"><title id="title">Spring transaction proxy and propagation behavior</title><desc id="desc">An external call crosses a proxy. Required joins the current transaction, Requires New suspends it and uses another connection, and same-object calls bypass the proxy.</desc><defs><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.amber{fill:#fef3c7;stroke:#d97706}.red{fill:#fee2e2;stroke:#dc2626}.t{font:19px sans-serif;fill:#0f172a}.h{font:bold 24px sans-serif;fill:#0f172a}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}.dash{stroke:#dc2626;stroke-width:3;stroke-dasharray:9 7;marker-end:url(#r)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#475569"/></marker><marker id="r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#dc2626"/></marker></defs><rect class="bg" width="1200" height="500" rx="18"/><rect class="b blue" x="40" y="80" width="190" height="90" rx="12"/><text class="h" x="92" y="133">caller</text><path class="a" d="M230 125h70"/><rect class="b green" x="300" y="65" width="270" height="120" rx="12"/><text class="h" x="345" y="105">transaction proxy</text><text class="t" x="330" y="140">resolve metadata + interceptor</text><text class="t" x="360" y="168">commit / rollback</text><path class="a" d="M570 125h70"/><rect class="b" x="640" y="80" width="230" height="90" rx="12"/><text class="h" x="695" y="120">service</text><text class="t" x="675" y="150">business method</text><rect class="b blue" x="60" y="300" width="300" height="120" rx="12"/><text class="h" x="105" y="340">REQUIRED</text><text class="t" x="90" y="375">join current transaction</text><text class="t" x="90" y="405">one connection/context</text><rect class="b amber" x="450" y="300" width="300" height="120" rx="12"/><text class="h" x="500" y="340">REQUIRES_NEW</text><text class="t" x="480" y="375">suspend outer transaction</text><text class="t" x="480" y="405">needs another connection</text><rect class="b red" x="840" y="300" width="300" height="120" rx="12"/><text class="h" x="895" y="340">self-invocation</text><text class="t" x="875" y="375">this.otherMethod()</text><text class="t" x="875" y="405">proxy is not crossed</text><path class="dash" d="M755 170l190 130"/></svg>
