<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI use cases map</title><desc id="desc">Map of common Generative AI use cases for a commerce backend.</desc>
  <style>.bg{fill:#f8fafc}.c{fill:#fff;stroke:#111827;stroke-width:2;rx:14}.a{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:12}.b{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.d{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}.e{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.s{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}</style>
  <rect class="bg" width="1200" height="720"/><text class="h" x="50" y="55">Generative AI Use Cases For Shopverse</text><text class="s" x="50" y="84">Use the model for language and reasoning; keep business truth in backend services.</text>
  <rect class="c" x="470" y="130" width="260" height="100"/><text class="t" x="520" y="170">Shopverse AI</text><text class="s" x="516" y="198">assistant and backend AI</text>
  <rect class="a" x="80" y="290" width="240" height="100"/><text class="t" x="120" y="326">Q&amp;A / RAG</text><text class="s" x="112" y="354">policy, FAQ, docs</text>
  <rect class="b" x="360" y="290" width="240" height="100"/><text class="t" x="405" y="326">Extraction</text><text class="s" x="390" y="354">intent, filters, fields</text>
  <rect class="d" x="640" y="290" width="240" height="100"/><text class="t" x="680" y="326">Recommendation</text><text class="s" x="684" y="354">real products via API</text>
  <rect class="e" x="920" y="290" width="240" height="100"/><text class="t" x="974" y="326">Summaries</text><text class="s" x="950" y="354">reviews, support, orders</text>
  <rect class="a" x="220" y="470" width="240" height="100"/><text class="t" x="268" y="506">Classification</text><text class="s" x="260" y="534">route support requests</text>
  <rect class="b" x="500" y="470" width="240" height="100"/><text class="t" x="558" y="506">Tools</text><text class="s" x="532" y="534">inventory/order services</text>
  <rect class="d" x="780" y="470" width="240" height="100"/><text class="t" x="838" y="506">Admin Help</text><text class="s" x="820" y="534">explain runbooks safely</text>
</svg>
