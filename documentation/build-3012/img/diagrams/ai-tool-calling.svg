<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Tool calling for real backend data</title>
  <desc id="desc">Diagram showing the model extracting intent and the backend calling real Shopverse services for product recommendations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg{fill:#fafaf9}
      .box{fill:#fff;stroke:#111827;stroke-width:2;rx:12}
      .model{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}
      .service{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:12}
      .data{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;fill:#111827}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:24px;fill:#111827;font-weight:700}
      .line{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="50" y="52">Tool Calling Pattern for Product Recommendations</text>
  <text class="small" x="50" y="82">The model extracts intent; the backend fetches real data; the model formats the final response.</text>

  <rect class="box" x="60" y="208" width="190" height="104"/>
  <text class="text" x="94" y="246">User asks</text>
  <text class="small" x="90" y="274">Gaming laptop</text>
  <text class="small" x="90" y="296">under 50000</text>

  <rect class="model" x="320" y="190" width="210" height="140"/>
  <text class="text" x="350" y="228">LLM extracts</text>
  <text class="small" x="354" y="258">intent: product</text>
  <text class="small" x="354" y="282">category: laptop</text>
  <text class="small" x="354" y="306">maxPrice: 50000</text>

  <rect class="service" x="600" y="190" width="220" height="140"/>
  <text class="text" x="646" y="228">AI service</text>
  <text class="small" x="632" y="258">validates JSON</text>
  <text class="small" x="632" y="282">calls inventory API</text>
  <text class="small" x="632" y="306">keeps business rules</text>

  <rect class="data" x="890" y="190" width="220" height="140"/>
  <text class="text" x="930" y="228">Inventory DB</text>
  <text class="small" x="922" y="258">real products</text>
  <text class="small" x="922" y="282">price and stock</text>
  <text class="small" x="922" y="306">catalog metadata</text>

  <rect class="model" x="462" y="430" width="280" height="90"/>
  <text class="text" x="500" y="466">Final response</text>
  <text class="small" x="500" y="492">Uses only returned products</text>

  <path class="line" d="M 250 260 L 320 260"/>
  <path class="line" d="M 530 260 L 600 260"/>
  <path class="line" d="M 820 260 L 890 260"/>
  <path class="line" d="M 1000 330 C 960 430 840 474 742 474"/>
  <path class="line" d="M 462 474 C 330 450 236 374 190 312"/>
</svg>
