<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Java thread lifecycle states</title><desc id="desc">Transitions between new, runnable, blocked, waiting, timed waiting, and terminated states.</desc>
  <style>.bg{fill:#f8fafc}.n{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.wait{fill:#fef3c7;stroke:#a16207;stroke-width:2}.end{fill:#dcfce7;stroke:#15803d;stroke-width:2}.h{font:700 20px system-ui;fill:#0f172a}.p{font:14px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker></defs>
  <rect class="bg" width="1200" height="650"/><text class="h" x="35" y="42">Java Thread.State transitions (RUNNABLE includes running and OS-ready)</text>
  <rect class="n" x="40" y="260" width="170" height="85" rx="18"/><text class="h" x="92" y="300">NEW</text><rect class="n" x="330" y="260" width="210" height="85" rx="18"/><text class="h" x="382" y="300">RUNNABLE</text>
  <rect class="wait" x="700" y="80" width="220" height="90" rx="18"/><text class="h" x="755" y="118">BLOCKED</text><text class="p" x="730" y="145">waiting for monitor entry</text>
  <rect class="wait" x="700" y="255" width="220" height="90" rx="18"/><text class="h" x="760" y="293">WAITING</text><text class="p" x="735" y="320">wait / join / park</text>
  <rect class="wait" x="700" y="430" width="220" height="90" rx="18"/><text class="h" x="720" y="468">TIMED_WAITING</text><text class="p" x="735" y="495">sleep / timed wait</text>
  <rect class="end" x="1000" y="260" width="170" height="85" rx="18"/><text class="h" x="1018" y="300">TERMINATED</text>
  <path class="a" d="M210 302H330"/><text class="p" x="245" y="286">start()</text><path class="a" d="M540 275C620 180 640 130 700 125"/><text class="p" x="560" y="185">monitor unavailable</text><path class="a" d="M700 150C630 205 610 250 540 285"/><text class="p" x="565" y="235">monitor acquired</text><path class="a" d="M540 302H700"/><text class="p" x="570" y="286">wait/join/park</text><path class="a" d="M700 325H540"/><text class="p" x="560" y="348">notify/unpark/complete</text><path class="a" d="M540 330C620 420 640 470 700 475"/><text class="p" x="560" y="440">sleep/timed wait</text><path class="a" d="M700 500C620 420 610 360 540 330"/><text class="p" x="555" y="390">timeout/notify</text><path class="a" d="M540 302H1000"/><text class="p" x="840" y="286">run() exits</text>
</svg>
