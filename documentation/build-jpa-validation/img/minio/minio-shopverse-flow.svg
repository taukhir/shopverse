<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Shopverse MinIO product image flow</title>
  <desc id="desc">Inventory stores product metadata in MySQL and image bytes in MinIO. The browser receives image URLs from Inventory and downloads images directly from MinIO.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <linearGradient id="media" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="520" rx="0" fill="#f8fafc"/>
  <rect x="38" y="36" width="1044" height="448" rx="18" fill="#ffffff" stroke="#dbe3ef"/>

  <text x="70" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Shopverse product media with MinIO</text>
  <text x="70" y="113" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Metadata stays in Inventory and MySQL. Heavy image bytes are served by MinIO.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="210" height="160" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <circle cx="118" cy="218" r="28" fill="#2563eb"/>
    <path d="M105 217 h26 M118 204 v26" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <text x="98" y="272" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Angular UI</text>
    <text x="98" y="299" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">renders product cards</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="150" width="230" height="200" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="424" y="190" width="76" height="66" rx="10" fill="#16a34a"/>
    <rect x="452" y="202" width="20" height="42" rx="4" fill="#dcfce7"/>
    <text x="422" y="289" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Inventory API</text>
    <text x="422" y="316" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">returns imageUrl + imageKey</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="104" width="260" height="150" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <ellipse cx="770" cy="152" rx="42" ry="14" fill="#f97316"/>
    <rect x="728" y="152" width="84" height="46" fill="#fb923c"/>
    <ellipse cx="770" cy="198" rx="42" ry="14" fill="#ea580c"/>
    <text x="840" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">MySQL</text>
    <text x="840" y="185" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">small catalog rows</text>
    <text x="840" y="209" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">no image bytes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="300" width="260" height="150" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
    <rect x="752" y="338" width="68" height="58" rx="10" fill="url(#media)"/>
    <circle cx="770" cy="356" r="8" fill="#f8fafc"/>
    <path d="M758 391 l19 -20 l13 12 l12 -16 l22 24 Z" fill="#e0f2fe"/>
    <text x="840" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">MinIO</text>
    <text x="840" y="381" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">PNG/WebP object bytes</text>
    <text x="840" y="405" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">bucket: shopverse-product-images</text>
  </g>

  <path d="M282 228 C320 205 338 205 376 222" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="292" y="197" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">GET catalog</text>

  <path d="M612 212 C650 168 678 156 714 156" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="628" y="143" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">read metadata</text>

  <path d="M714 376 C610 428 350 420 204 332" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="395" y="444" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">browser downloads image directly</text>

  <rect x="70" y="380" width="210" height="48" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="90" y="410" font-family="Consolas, Menlo, monospace" font-size="14" fill="#0f172a">products/101.png</text>

  <rect x="380" y="380" width="230" height="48" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="400" y="410" font-family="Consolas, Menlo, monospace" font-size="14" fill="#0f172a">imageUrl + imageKey</text>
</svg>
