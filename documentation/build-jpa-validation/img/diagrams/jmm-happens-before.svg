<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="610" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">Java happens-before and safe publication</title><desc id="desc">Thread A constructs data and performs a release action; Thread B performs the matching acquire action before reading initialized data.</desc>
  <style>.bg{fill:#f8fafc}.lane{fill:#fff;stroke:#64748b;stroke-width:2}.op{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.sync{fill:#dcfce7;stroke:#15803d;stroke-width:2}.bad{fill:#fee2e2;stroke:#b91c1c;stroke-width:2}.h{font:700 21px system-ui;fill:#0f172a}.p{font:15px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#m)}.hb{stroke:#16a34a;stroke-width:4;fill:none;marker-end:url(#g)}</style><defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker><marker id="g" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#16a34a"/></marker></defs>
  <rect class="bg" width="1200" height="610"/><text class="h" x="35" y="40">Safe publication establishes visibility; timing alone does not</text>
  <rect class="lane" x="50" y="75" width="440" height="470" rx="18"/><text class="h" x="210" y="110">Thread A</text><rect class="op" x="105" y="150" width="330" height="75" rx="12"/><text class="h" x="160" y="185">construct Snapshot</text><text class="p" x="155" y="208">initialize final and mutable state</text><rect class="sync" x="105" y="330" width="330" height="75" rx="12"/><text class="h" x="150" y="365">release / publish</text><text class="p" x="145" y="388">volatile write or monitor unlock</text><path class="a" d="M270 225V330"/><text class="p" x="285" y="285">program order</text>
  <rect class="lane" x="710" y="75" width="440" height="470" rx="18"/><text class="h" x="870" y="110">Thread B</text><rect class="sync" x="765" y="330" width="330" height="75" rx="12"/><text class="h" x="815" y="365">acquire / observe</text><text class="p" x="800" y="388">volatile read or monitor lock</text><rect class="op" x="765" y="455" width="330" height="60" rx="12"/><text class="h" x="835" y="492">read initialized state</text><path class="a" d="M930 405V455"/>
  <path class="hb" d="M435 367H765"/><text class="h" x="530" y="350">happens-before</text><rect class="bad" x="505" y="145" width="190" height="90" rx="12"/><text class="h" x="535" y="178">No sync edge</text><text class="p" x="525" y="205">stale/illegal observation</text>
</svg>
