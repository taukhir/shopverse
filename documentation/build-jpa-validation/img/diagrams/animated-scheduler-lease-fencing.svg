<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc"><title id="title">Scheduler lease expiry and fencing animation</title><desc id="desc">Worker A owns generation 7, pauses past lease expiry, worker B claims generation 8, and the resource rejects stale generation 7.</desc><style>.bg{fill:#f8fafc}.a{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.b{fill:#dcfce7;stroke:#15803d;stroke-width:2}.r{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.h{font:700 19px system-ui;fill:#0f172a}.t{font:14px system-ui;fill:#334155}.line{stroke:#475569;stroke-width:3}</style><rect class="bg" width="1200" height="460"/><text class="h" x="30" y="38">Lease expiry does not stop a paused worker; fencing rejects stale ownership</text><rect class="a" x="60" y="100" width="230" height="90" rx="15"/><text class="h" x="105" y="137">Worker A</text><text class="t" x="105" y="165">token 7 — pauses</text><rect class="b" x="60" y="270" width="230" height="90" rx="15"/><text class="h" x="105" y="307">Worker B</text><text class="t" x="105" y="335">claims token 8</text><rect class="r" x="830" y="160" width="300" height="130" rx="15"/><text class="h" x="880" y="200">Protected resource</text><text class="t" x="875" y="235">accept token ≥ current</text><text class="t" x="875" y="262">reject stale token 7</text><line class="line" x1="290" y1="145" x2="830" y2="205"><animate attributeName="stroke" values="#2563eb;#dc2626;#dc2626" dur="6s" repeatCount="indefinite"/></line><line class="line" x1="290" y1="315" x2="830" y2="245"><animate attributeName="stroke" values="#94a3b8;#16a34a;#16a34a" dur="6s" repeatCount="indefinite"/></line><text class="t" x="410" y="405">Generation is stored with the claim and checked on every completion/write.</text></svg>
