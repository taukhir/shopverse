<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc"><title id="title">Sequential stream fusion and parallel fork join execution</title><desc id="desc">Sequential streams pass each element through a fused sink chain; parallel streams split via a spliterator into fork join tasks and combine partial results.</desc><defs><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.violet{fill:#ede9fe;stroke:#7c3aed}.t{font:19px sans-serif;fill:#0f172a}.h{font:bold 24px sans-serif;fill:#0f172a}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="540" rx="18"/><text class="h" x="40" y="45">Sequential: one element flows through a fused sink chain</text><rect class="b blue" x="45" y="75" width="190" height="80" rx="12"/><text class="t" x="85" y="123">Spliterator</text><path class="a" d="M235 115h55"/><rect class="b" x="290" y="75" width="170" height="80" rx="12"/><text class="t" x="345" y="123">filter</text><path class="a" d="M460 115h55"/><rect class="b" x="515" y="75" width="170" height="80" rx="12"/><text class="t" x="575" y="123">map</text><path class="a" d="M685 115h55"/><rect class="b" x="740" y="75" width="170" height="80" rx="12"/><text class="t" x="800" y="123">limit</text><path class="a" d="M910 115h55"/><rect class="b green" x="965" y="75" width="190" height="80" rx="12"/><text class="t" x="1005" y="123">terminal sink</text><text class="h" x="40" y="230">Parallel: split tasks, steal work, combine partial results</text><rect class="b blue" x="480" y="260" width="240" height="70" rx="12"/><text class="t" x="515" y="303">source spliterator</text><path class="a" d="M550 330l-210 70"/><path class="a" d="M650 330l210 70"/><rect class="b violet" x="210" y="400" width="260" height="75" rx="12"/><text class="t" x="245" y="430">worker deque A</text><text class="t" x="245" y="458">leaf tasks + local reduce</text><rect class="b violet" x="730" y="400" width="260" height="75" rx="12"/><text class="t" x="765" y="430">worker deque B</text><text class="t" x="765" y="458">steal + local reduce</text><path class="a" d="M470 438h260"/><rect class="b green" x="480" y="470" width="240" height="55" rx="12"/><text class="t" x="525" y="505">combine result</text></svg>
