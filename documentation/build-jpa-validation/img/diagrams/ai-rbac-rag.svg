<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Role based RAG retrieval</title>
  <desc id="desc">Role and ownership filters limit vector search results before context is sent to an LLM.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/></marker>
    <style>.bg{fill:#fbfbf9}.box{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.allowed{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}.denied{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12}.data{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.text{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}.line{stroke:#0f766e;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="50" y="52">Authorization-Aware RAG</text>
  <text class="small" x="50" y="82">Vector search must apply metadata filters before context reaches the model.</text>
  <rect class="box" x="70" y="150" width="230" height="110"/><text class="text" x="112" y="188">Current User</text><text class="small" x="104" y="218">id=user-42</text><text class="small" x="104" y="240">roles=CUSTOMER</text>
  <rect class="box" x="370" y="150" width="250" height="110"/><text class="text" x="412" y="188">Retrieval Filter</text><text class="small" x="402" y="218">visibility=PUBLIC</text><text class="small" x="402" y="240">ownerId=user-42 if private</text>
  <rect class="data" x="710" y="110" width="360" height="360"/><text class="text" x="822" y="150">Vector DB</text>
  <rect class="allowed" x="750" y="190" width="280" height="55"/><text class="small" x="776" y="224">PUBLIC return-policy.md</text>
  <rect class="allowed" x="750" y="265" width="280" height="55"/><text class="small" x="776" y="299">PRIVATE order user-42</text>
  <rect class="denied" x="750" y="340" width="280" height="55"/><text class="small" x="776" y="374">PRIVATE order user-99</text>
  <rect class="denied" x="750" y="415" width="280" height="55"/><text class="small" x="776" y="449">ADMIN runbook</text>
  <rect class="allowed" x="430" y="500" width="300" height="90"/><text class="text" x="480" y="536">LLM Context</text><text class="small" x="466" y="564">Only allowed chunks included</text>
  <path class="line" d="M 300 205 L 370 205"/><path class="line" d="M 620 205 L 710 205"/><path class="line" d="M 850 470 C 800 530 760 545 730 545"/>
  <text class="small" x="70" y="640">Never retrieve first and filter after generation. Filter before vector search or before prompt construction.</text>
</svg>
