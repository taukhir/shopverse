<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">JVM process memory areas</title><desc id="desc">Heap, thread stacks, metaspace, code cache, direct buffers, and native memory within a JVM process and container limit.</desc>
  <style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2}.heap{fill:#dcfce7}.thread{fill:#dbeafe}.native{fill:#fef3c7}.t{font:700 24px system-ui;fill:#0f172a}.h{font:700 18px system-ui;fill:#0f172a}.p{font:15px system-ui;fill:#334155}.arrow{stroke:#64748b;stroke-width:2;marker-end:url(#a)}</style>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <rect class="bg" width="1200" height="680"/><text class="t" x="40" y="45">JVM process inside a container / operating-system memory limit</text>
  <rect class="box heap" x="40" y="80" width="700" height="330" rx="18"/><text class="h" x="70" y="115">Shared managed heap</text>
  <rect class="box" x="75" y="145" width="290" height="220" rx="12"/><text class="h" x="100" y="180">Young regions / TLABs</text><text class="p" x="100" y="215">Fast thread-local allocation</text><text class="p" x="100" y="245">Most objects die young</text>
  <rect class="box" x="405" y="145" width="290" height="220" rx="12"/><text class="h" x="430" y="180">Old / long-lived regions</text><text class="p" x="430" y="215">Promoted surviving objects</text><text class="p" x="430" y="245">Caches and retained graphs</text>
  <rect class="box thread" x="780" y="80" width="380" height="330" rx="18"/><text class="h" x="810" y="115">Per-thread memory</text><rect class="box" x="820" y="145" width="140" height="220" rx="10"/><text class="h" x="840" y="180">Thread A</text><text class="p" x="840" y="215">Java stack</text><text class="p" x="840" y="245">frames/locals</text><text class="p" x="840" y="275">PC register</text><rect class="box" x="980" y="145" width="140" height="220" rx="10"/><text class="h" x="1000" y="180">Thread B</text><text class="p" x="1000" y="215">Java stack</text><text class="p" x="1000" y="245">frames/locals</text><text class="p" x="1000" y="275">PC register</text>
  <rect class="box native" x="40" y="455" width="1120" height="170" rx="18"/><text class="h" x="70" y="490">Native and VM memory (outside Java heap)</text><text class="p" x="70" y="530">Metaspace / class metadata</text><text class="p" x="330" y="530">JIT code cache</text><text class="p" x="560" y="530">Direct buffers / mmap</text><text class="p" x="820" y="530">GC structures / JNI / agents</text><text class="p" x="70" y="580">Container OOM can occur even when heap has room: budget heap + stacks + native + sidecars.</text>
</svg>
