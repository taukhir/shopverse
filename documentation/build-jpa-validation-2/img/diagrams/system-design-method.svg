<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end system design method</title><desc id="desc">Eight-step process from scope and estimates to contracts, data, flows, scaling, operations, and evolution.</desc>
  <style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#4f46e5;stroke-width:2}.h{font:700 18px system-ui;fill:#111827}.p{font:13px system-ui;fill:#374151}.a{stroke:#6366f1;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#6366f1"/></marker></defs><rect class="bg" width="1400" height="520"/><text class="h" x="35" y="42">System design is an evidence loop, not a technology checklist</text>
  <g><rect class="b" x="35" y="100" width="260" height="100" rx="16"/><text class="h" x="60" y="135">1. Scope + rank NFRs</text><text class="p" x="60" y="165">correctness, latency, availability</text><rect class="b" x="370" y="100" width="260" height="100" rx="16"/><text class="h" x="395" y="135">2. Estimate scale</text><text class="p" x="395" y="165">peak, storage, bandwidth, skew</text><rect class="b" x="705" y="100" width="260" height="100" rx="16"/><text class="h" x="730" y="135">3. Contracts + invariants</text><text class="p" x="730" y="165">API, event, identity, transaction</text><rect class="b" x="1040" y="100" width="300" height="100" rx="16"/><text class="h" x="1065" y="135">4. Data from access patterns</text><text class="p" x="1065" y="165">schema, index, partition, retention</text></g>
  <g><rect class="b" x="1040" y="320" width="300" height="100" rx="16"/><text class="h" x="1065" y="355">5. Critical flows</text><text class="p" x="1065" y="385">success, timeout, duplicate, conflict</text><rect class="b" x="705" y="320" width="260" height="100" rx="16"/><text class="h" x="730" y="355">6. Scale + protect</text><text class="p" x="730" y="385">bounds, queues, backpressure</text><rect class="b" x="370" y="320" width="260" height="100" rx="16"/><text class="h" x="395" y="355">7. Operate + recover</text><text class="p" x="395" y="385">SLO, RPO/RTO, security, cost</text><rect class="b" x="35" y="320" width="260" height="100" rx="16"/><text class="h" x="60" y="355">8. Alternatives + evolution</text><text class="p" x="60" y="385">reject, benchmark, migration trigger</text></g>
  <path class="a" d="M295 150H370"/><path class="a" d="M630 150H705"/><path class="a" d="M965 150H1040"/><path class="a" d="M1190 200V320"/><path class="a" d="M1040 370H965"/><path class="a" d="M705 370H630"/><path class="a" d="M370 370H295"/><path class="a" d="M165 320C165 260 165 250 165 200"/><text class="p" x="180" y="265">revisit assumptions</text>
</svg>
