<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc"><title id="title">Java method resolution and runtime dispatch</title><desc id="desc">The compiler selects an overload and descriptor before the JVM dispatches an overridable instance method using the runtime receiver.</desc><defs><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2}.compile{fill:#dbeafe;stroke:#2563eb}.runtime{fill:#dcfce7;stroke:#16a34a}.warn{fill:#fef3c7;stroke:#d97706}.t{font:22px sans-serif;fill:#0f172a}.h{font:bold 25px sans-serif;fill:#0f172a}.s{font:18px sans-serif;fill:#334155}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="500" rx="18"/><text class="h" x="45" y="48">Two decisions—not one</text><rect class="box compile" x="45" y="85" width="300" height="165" rx="14"/><text class="h" x="70" y="125">1. Compile time</text><text class="t" x="70" y="165">Find applicable overloads</text><text class="s" x="70" y="198">strict → boxing → varargs</text><text class="s" x="70" y="228">choose most specific descriptor</text><path class="a" d="M345 167 H435"/><rect class="box" x="435" y="105" width="300" height="125" rx="14"/><text class="h" x="460" y="145">Selected descriptor</text><text class="t" x="460" y="185">value()Ljava/lang/Number;</text><path class="a" d="M735 167 H825"/><rect class="box runtime" x="825" y="85" width="330" height="165" rx="14"/><text class="h" x="850" y="125">2. Runtime</text><text class="t" x="850" y="165">Instance method?</text><text class="s" x="850" y="198">dispatch on receiver class</text><text class="s" x="850" y="228">Child override may execute</text><rect class="box warn" x="130" y="315" width="940" height="125" rx="14"/><text class="h" x="165" y="355">Static methods and fields stop after compile-time selection</text><text class="t" x="165" y="397">They are hidden, not overridden; the reference/class type determines the selected member.</text></svg>
