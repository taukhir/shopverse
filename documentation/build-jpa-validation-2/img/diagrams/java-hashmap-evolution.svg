<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc"><title id="title">HashMap bucket, resize and treeification lifecycle</title><desc id="desc">A key hash selects a bucket, collisions form a list, resize redistributes entries, and sufficiently large collision bins can become trees.</desc><defs><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe;stroke:#2563eb}.amber{fill:#fef3c7;stroke:#d97706}.green{fill:#dcfce7;stroke:#16a34a}.t{font:20px sans-serif;fill:#0f172a}.h{font:bold 24px sans-serif;fill:#0f172a}.s{font:17px sans-serif;fill:#475569}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="520" rx="18"/><text class="h" x="45" y="48">HashMap structural evolution</text><rect class="b blue" x="45" y="90" width="245" height="120" rx="12"/><text class="h" x="68" y="128">Locate bucket</text><text class="t" x="68" y="165">spread(hashCode)</text><text class="s" x="68" y="194">index = (n − 1) &amp; hash</text><path class="a" d="M290 150h65"/><rect class="b" x="355" y="90" width="245" height="120" rx="12"/><text class="h" x="378" y="128">Compare entries</text><text class="t" x="378" y="165">hash, then equals</text><text class="s" x="378" y="194">replace equal key</text><path class="a" d="M600 150h65"/><rect class="b amber" x="665" y="90" width="245" height="120" rx="12"/><text class="h" x="688" y="128">Collision bin</text><text class="t" x="688" y="165">linked entries</text><text class="s" x="688" y="194">poor hashes increase work</text><path class="a" d="M910 150h65"/><rect class="b green" x="975" y="90" width="180" height="120" rx="12"/><text class="h" x="997" y="128">Tree bin</text><text class="t" x="997" y="165">large bin +</text><text class="s" x="997" y="194">sufficient table</text><rect class="b blue" x="150" y="310" width="380" height="125" rx="12"/><text class="h" x="175" y="350">Resize threshold crossed</text><text class="t" x="175" y="388">size &gt; capacity × load factor</text><text class="s" x="175" y="418">table doubles; nodes split low/high</text><path class="a" d="M530 372h135"/><rect class="b green" x="665" y="310" width="385" height="125" rx="12"/><text class="h" x="690" y="350">New table</text><text class="t" x="690" y="388">bucket i or i + oldCapacity</text><text class="s" x="690" y="418">pre-sizing avoids repeated migration</text></svg>
