<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DaoAuthenticationProvider internal authentication phases</title>
  <desc id="desc">The DAO provider retrieves a user, performs pre-checks, verifies the raw password against the stored hash, performs post-checks, and creates an authenticated result or throws an authentication exception.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L8 3Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".1"/></filter><style>.bg{fill:#f8fafc}.title{font:700 34px Arial;fill:#0f172a}.sub{font:400 17px Arial;fill:#475569}.phase{font:700 15px Arial;fill:#2563eb;letter-spacing:1px}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:18;filter:url(#s)}.ok{fill:#f0fdf4;stroke:#4ade80}.bad{fill:#fff1f2;stroke:#fb7185}.head{font:700 18px Arial;fill:#0f172a}.txt{font:400 14px Arial;fill:#475569}.arr{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#a)}.fail{stroke:#e11d48;stroke-width:2;stroke-dasharray:7 6;fill:none;marker-end:url(#a)}.small{font:700 12px Arial;fill:#be123c}</style></defs>
  <rect class="bg" width="1400" height="760"/><text x="60" y="62" class="title">Inside DaoAuthenticationProvider.authenticate(...)</text><text x="60" y="96" class="sub">Retrieval, account checks, password matching, and trusted result creation</text>
  <text x="60" y="150" class="phase">INPUT</text><rect x="60" y="172" width="245" height="105" class="card"/><text x="84" y="210" class="head">Unauthenticated token</text><text x="84" y="240" class="txt">username + raw password</text><text x="84" y="262" class="txt">authenticated = false</text>
  <text x="355" y="150" class="phase">1 · RETRIEVE</text><rect x="355" y="172" width="260" height="105" class="card"/><text x="379" y="210" class="head">Load UserDetails</text><text x="379" y="240" class="txt">Cache hit, otherwise call</text><text x="379" y="262" class="txt">loadUserByUsername(...)</text>
  <text x="665" y="150" class="phase">2 · PRE-CHECKS</text><rect x="665" y="172" width="260" height="105" class="card"/><text x="689" y="210" class="head">Account status</text><text x="689" y="240" class="txt">enabled · unlocked</text><text x="689" y="262" class="txt">account not expired</text>
  <text x="975" y="150" class="phase">3 · CREDENTIALS</text><rect x="975" y="172" width="350" height="105" class="card"/><text x="999" y="210" class="head">PasswordEncoder.matches(...)</text><text x="999" y="240" class="txt">raw submitted password + stored hash</text><text x="999" y="262" class="txt">constant-time algorithm verification</text>
  <path d="M305 225H355" class="arr"/><path d="M615 225H665" class="arr"/><path d="M925 225H975" class="arr"/>
  <text x="975" y="348" class="phase">4 · POST-CHECKS</text><rect x="975" y="370" width="350" height="105" class="card"/><text x="999" y="410" class="head">Credentials status</text><text x="999" y="440" class="txt">credentials not expired</text><text x="999" y="462" class="txt">optional password upgrade path</text>
  <text x="665" y="348" class="phase">5 · RESULT</text><rect x="665" y="370" width="260" height="105" class="card ok"/><text x="689" y="410" class="head">Authenticated token</text><text x="689" y="440" class="txt">principal = UserDetails</text><text x="689" y="462" class="txt">authorities + factor</text>
  <text x="355" y="348" class="phase">6 · MANAGER</text><rect x="355" y="370" width="260" height="105" class="card ok"/><text x="379" y="410" class="head">ProviderManager</text><text x="379" y="440" class="txt">receives trusted result</text><text x="379" y="462" class="txt">erases credentials</text>
  <text x="60" y="348" class="phase">7 · CALLER</text><rect x="60" y="370" width="245" height="105" class="card ok"/><text x="84" y="410" class="head">Authentication filter</text><text x="84" y="440" class="txt">sets SecurityContext</text><text x="84" y="462" class="txt">continues filter chain</text>
  <path d="M1150 277V370" class="arr"/><path d="M975 423H925" class="arr"/><path d="M665 423H615" class="arr"/><path d="M355 423H305" class="arr"/>
  <rect x="355" y="570" width="970" height="112" class="card bad"/><text x="383" y="609" class="head">Any failure → AuthenticationException</text><text x="383" y="640" class="txt">Username not found · bad credentials · disabled · locked · account expired · credentials expired</text><text x="383" y="664" class="txt">The filter invokes failure handling; an AuthenticationEntryPoint commonly returns 401; no controller call.</text>
  <path d="M485 277V570" class="fail"/><path d="M795 277V540H665V570" class="fail"/><path d="M1150 277V540H1000V570" class="fail"/><text x="496" y="552" class="small">FAIL</text>
</svg>
