<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Animated tool authorization</title><desc id="desc">Model tool request passes through Java validation and authorization before backend execution.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#7c3aed"/></marker><style>.bg{fill:#fbfbf9}.b{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.m{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.g{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.s{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}.l{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#a)}.dot{fill:#7c3aed}</style></defs>
  <rect class="bg" width="1200" height="560"/><text class="h" x="50" y="55">Tool Authorization Flow</text><text class="s" x="50" y="84">The LLM may request a tool, but Java validates and authorizes before execution.</text>
  <rect class="m" x="70" y="230" width="180" height="90"/><text class="t" x="116" y="264">Model</text><text class="s" x="98" y="292">requests tool</text>
  <rect class="b" x="330" y="230" width="180" height="90"/><text class="t" x="372" y="264">Validate</text><text class="s" x="365" y="292">arguments</text>
  <rect class="b" x="590" y="230" width="180" height="90"/><text class="t" x="634" y="264">Authorize</text><text class="s" x="622" y="292">role + owner</text>
  <rect class="g" x="850" y="230" width="210" height="90"/><text class="t" x="902" y="264">Execute</text><text class="s" x="890" y="292">backend service</text>
  <path class="l" d="M250 275 L330 275"/><path class="l" d="M510 275 L590 275"/><path class="l" d="M770 275 L850 275"/>
  <circle class="dot" r="9"><animateMotion dur="4s" repeatCount="indefinite" path="M160 275 L420 275 L680 275 L955 275"/></circle>
</svg>
