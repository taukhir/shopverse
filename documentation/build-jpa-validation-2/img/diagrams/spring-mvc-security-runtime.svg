<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc"><title id="title">Spring Security and MVC request runtime</title><desc id="desc">A servlet request passes container filters, the selected security chain and DispatcherServlet before handler mapping, argument resolution, controller logic and response conversion.</desc><defs><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.amber{fill:#fef3c7;stroke:#d97706}.t{font:18px sans-serif;fill:#0f172a}.h{font:bold 23px sans-serif;fill:#0f172a}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="480" rx="18"/><text class="h" x="40" y="45">Servlet and security boundary</text><rect class="b blue" x="40" y="75" width="160" height="75" rx="12"/><text class="t" x="90" y="120">client</text><path class="a" d="M200 112h45"/><rect class="b" x="245" y="75" width="190" height="75" rx="12"/><text class="t" x="278" y="108">container filters</text><text class="t" x="278" y="133">wrap request</text><path class="a" d="M435 112h45"/><rect class="b green" x="480" y="65" width="280" height="95" rx="12"/><text class="h" x="512" y="103">FilterChainProxy</text><text class="t" x="505" y="135">select one SecurityFilterChain</text><path class="a" d="M760 112h45"/><rect class="b amber" x="805" y="75" width="340" height="75" rx="12"/><text class="t" x="835" y="108">authenticate → authorize</text><text class="t" x="835" y="133">SecurityContext ownership</text><path class="a" d="M975 150v90"/><text class="h" x="40" y="255">Spring MVC boundary</text><rect class="b green" x="40" y="285" width="230" height="80" rx="12"/><text class="t" x="78" y="333">DispatcherServlet</text><path class="a" d="M270 325h45"/><rect class="b" x="315" y="285" width="190" height="80" rx="12"/><text class="t" x="345" y="318">handler mapping</text><text class="t" x="345" y="343">+ adapter</text><path class="a" d="M505 325h45"/><rect class="b" x="550" y="275" width="220" height="100" rx="12"/><text class="t" x="578" y="310">argument resolvers</text><text class="t" x="578" y="338">validation</text><text class="t" x="578" y="363">controller</text><path class="a" d="M770 325h45"/><rect class="b blue" x="815" y="285" width="330" height="80" rx="12"/><text class="t" x="850" y="318">return-value handler</text><text class="t" x="850" y="343">message converter / JSON</text><path class="a" d="M155 285l820-135"/></svg>
