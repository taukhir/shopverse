<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="470" viewBox="0 0 1400 470" role="img" aria-labelledby="title desc">
  <title id="title">Spring ApplicationContext refresh lifecycle</title><desc id="desc">Ordered phases from environment and bean definitions through factory post-processors, bean post-processors, singleton initialization, lifecycle start, and readiness.</desc>
  <style>.bg{fill:#f8fafc}.b{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.ext{fill:#dcfce7;stroke:#15803d;stroke-width:2}.bean{fill:#fef3c7;stroke:#a16207;stroke-width:2}.h{font:700 19px system-ui;fill:#0f172a}.p{font:13px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker></defs><rect class="bg" width="1400" height="470"/><text class="h" x="35" y="42">Spring context refresh: metadata first, instances and proxies later</text>
  <g><rect class="b" x="35" y="120" width="180" height="100" rx="14"/><text class="h" x="60" y="155">1. Prepare</text><text class="p" x="55" y="185">environment + factory</text><rect class="b" x="260" y="120" width="180" height="100" rx="14"/><text class="h" x="285" y="155">2. Definitions</text><text class="p" x="280" y="185">load + merge metadata</text><rect class="ext" x="485" y="120" width="190" height="100" rx="14"/><text class="h" x="505" y="155">3. Factory PPs</text><text class="p" x="505" y="185">change definitions</text><rect class="ext" x="720" y="120" width="190" height="100" rx="14"/><text class="h" x="745" y="155">4. Register BPPs</text><text class="p" x="742" y="185">instance interception</text><rect class="bean" x="955" y="120" width="190" height="100" rx="14"/><text class="h" x="980" y="155">5. Singletons</text><text class="p" x="980" y="185">create/init/proxy</text><rect class="bean" x="1190" y="120" width="175" height="100" rx="14"/><text class="h" x="1210" y="155">6. Ready</text><text class="p" x="1210" y="185">lifecycle + events</text></g>
  <path class="a" d="M215 170H260"/><path class="a" d="M440 170H485"/><path class="a" d="M675 170H720"/><path class="a" d="M910 170H955"/><path class="a" d="M1145 170H1190"/>
  <rect class="bean" x="805" y="300" width="470" height="100" rx="14"/><text class="h" x="830" y="335">Per bean: instantiate → populate dependencies → aware callbacks</text><text class="p" x="830" y="365">BPP before → @PostConstruct/init → BPP after (often returns proxy)</text><path class="a" d="M1050 220V300"/>
</svg>
