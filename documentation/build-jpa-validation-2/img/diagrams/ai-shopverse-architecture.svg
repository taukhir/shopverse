<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Shopverse AI assistant architecture</title>
  <desc id="desc">Architecture diagram for a Shopverse AI service integrated with gateway, vector database, LLM provider, inventory service, and order service.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <style>
      .bg{fill:#fbfbf9}
      .box{fill:#fff;stroke:#111827;stroke-width:2;rx:12}
      .service{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:12}
      .ai{fill:#eef2ff;stroke:#4f46e5;stroke-width:3;rx:14}
      .data{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}
      .external{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:12}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;fill:#111827}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#374151}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:24px;fill:#111827;font-weight:700}
      .line{stroke:#0f766e;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .thin{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="660"/>
  <text class="title" x="50" y="52">Shopverse AI Assistant POC Architecture</text>
  <text class="small" x="50" y="82">The AI service coordinates model calls, retrieval, and real Shopverse service calls.</text>

  <rect class="box" x="58" y="162" width="170" height="86"/>
  <text class="text" x="102" y="197">Client</text>
  <text class="small" x="84" y="222">Web or Postman</text>

  <rect class="service" x="294" y="162" width="190" height="86"/>
  <text class="text" x="334" y="197">API Gateway</text>
  <text class="small" x="328" y="222">Auth, routing</text>

  <rect class="ai" x="560" y="120" width="260" height="170"/>
  <text class="text" x="632" y="158">AI Service</text>
  <text class="small" x="596" y="188">Chat endpoint</text>
  <text class="small" x="596" y="214">RAG endpoint</text>
  <text class="small" x="596" y="240">Intent extraction</text>
  <text class="small" x="596" y="266">Response formatting</text>

  <rect class="external" x="914" y="80" width="210" height="86"/>
  <text class="text" x="958" y="115">LLM API</text>
  <text class="small" x="944" y="140">OpenAI/Ollama</text>

  <rect class="external" x="914" y="210" width="210" height="86"/>
  <text class="text" x="942" y="245">Embedding API</text>
  <text class="small" x="946" y="270">Text to vectors</text>

  <rect class="data" x="914" y="348" width="210" height="86"/>
  <text class="text" x="972" y="383">Vector DB</text>
  <text class="small" x="940" y="408">PGVector or Qdrant</text>

  <rect class="service" x="292" y="398" width="206" height="86"/>
  <text class="text" x="336" y="433">Inventory</text>
  <text class="small" x="334" y="458">Real products</text>

  <rect class="service" x="560" y="398" width="206" height="86"/>
  <text class="text" x="620" y="433">Orders</text>
  <text class="small" x="602" y="458">Real order state</text>

  <rect class="data" x="58" y="398" width="170" height="86"/>
  <text class="text" x="98" y="433">Docs</text>
  <text class="small" x="80" y="458">Policies and FAQ</text>

  <path class="line" d="M 228 205 L 294 205"/>
  <path class="line" d="M 484 205 L 560 205"/>
  <path class="line" d="M 820 160 L 914 123"/>
  <path class="line" d="M 820 230 L 914 253"/>
  <path class="line" d="M 820 277 C 870 310 870 360 914 391"/>
  <path class="thin" d="M 228 441 L 292 441"/>
  <path class="thin" d="M 498 441 L 560 441"/>
  <path class="thin" d="M 663 398 L 663 290"/>
  <path class="thin" d="M 395 398 C 430 328 505 280 560 250"/>

  <text class="small" x="52" y="560">Interview point: the LLM does not own business truth. Policies come from RAG; products and orders come from Shopverse services.</text>
</svg>
