<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">LangChain4j AI Service flow</title><desc id="desc">Java interface backed by LangChain4j model, tools, memory, and RAG.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#7c3aed"/></marker><style>.bg{fill:#fbfbf9}.b{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.lc{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.g{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.s{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}.l{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect class="bg" width="1200" height="640"/><text class="h" x="50" y="55">LangChain4j AI Service Flow</text><text class="s" x="50" y="84">A normal Java interface becomes an AI-backed service with tools, memory, and retrieval.</text>
  <rect class="b" x="70" y="260" width="190" height="90"/><text class="t" x="116" y="296">Spring Service</text><text class="s" x="105" y="324">calls Java method</text>
  <rect class="lc" x="340" y="240" width="220" height="130"/><text class="t" x="392" y="278">AI Service</text><text class="s" x="374" y="306">interface proxy</text><text class="s" x="374" y="330">prompts + parsing</text>
  <rect class="g" x="650" y="120" width="200" height="80"/><text class="t" x="710" y="153">Memory</text><text class="s" x="690" y="178">chat history</text>
  <rect class="g" x="650" y="270" width="200" height="80"/><text class="t" x="718" y="303">Tools</text><text class="s" x="688" y="328">Java methods/APIs</text>
  <rect class="g" x="650" y="420" width="200" height="80"/><text class="t" x="724" y="453">RAG</text><text class="s" x="690" y="478">retrieved context</text>
  <rect class="lc" x="940" y="270" width="180" height="90"/><text class="t" x="988" y="306">Model</text><text class="s" x="978" y="334">LLM provider</text>
  <path class="l" d="M260 305 L340 305"/><path class="l" d="M560 305 L650 160"/><path class="l" d="M560 305 L650 310"/><path class="l" d="M560 305 L650 460"/><path class="l" d="M850 310 L940 315"/>
</svg>
