<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Animated RAG ingestion flow</title><desc id="desc">Animated document ingestion flow: documents, chunks, embeddings, vector database.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#2563eb"/></marker><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.m{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.db{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.s{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}.l{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#a)}.dot{fill:#2563eb}</style></defs>
  <rect class="bg" width="1200" height="520"/><text class="h" x="50" y="55">Animated RAG Ingestion</text><text class="s" x="50" y="84">Documents are prepared before users ask questions.</text>
  <rect class="b" x="80" y="210" width="180" height="90"/><text class="t" x="122" y="246">Documents</text><text class="s" x="116" y="274">policy, FAQ</text>
  <rect class="b" x="350" y="210" width="180" height="90"/><text class="t" x="398" y="246">Chunks</text><text class="s" x="385" y="274">split by topic</text>
  <rect class="m" x="620" y="210" width="180" height="90"/><text class="t" x="662" y="246">Embedding</text><text class="s" x="655" y="274">text to vector</text>
  <rect class="db" x="890" y="210" width="200" height="90"/><text class="t" x="940" y="246">Vector DB</text><text class="s" x="930" y="274">vectors + metadata</text>
  <path class="l" d="M260 255 L350 255"/><path class="l" d="M530 255 L620 255"/><path class="l" d="M800 255 L890 255"/>
  <circle class="dot" r="10"><animateMotion dur="4s" repeatCount="indefinite" path="M170 255 L440 255 L710 255 L990 255"/></circle>
</svg>
