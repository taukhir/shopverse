<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc"><title id="title">Spring proxy interception and self-invocation animation</title><desc id="desc">An external call passes through transactional advice, while a target method calling another method on itself bypasses the proxy.</desc><style>.bg{fill:#f8fafc}.b{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.g{fill:#dcfce7;stroke:#15803d;stroke-width:2}.y{fill:#fef3c7;stroke:#ca8a04;stroke-width:2}.r{fill:none;stroke:#dc2626;stroke-width:4;stroke-dasharray:10 8}.h{font:700 19px system-ui;fill:#0f172a}.t{font:14px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker></defs><rect class="bg" width="1100" height="430"/><text class="h" x="30" y="38">Spring AOP: only calls crossing the proxy boundary are intercepted</text><rect class="b" x="50" y="145" width="180" height="90" rx="15"/><text class="h" x="105" y="185">Caller</text><rect class="g" x="380" y="125" width="220" height="130" rx="15"/><text class="h" x="450" y="165">Proxy</text><text class="t" x="420" y="200">security / transaction</text><text class="t" x="445" y="225">metrics / retry</text><rect class="y" x="770" y="125" width="250" height="180" rx="15"/><text class="h" x="835" y="165">Target bean</text><text class="t" x="820" y="205">outer() → inner()</text><path class="a" d="M230 190H380"><animate attributeName="stroke" values="#475569;#16a34a;#475569" dur="4s" repeatCount="indefinite"/></path><path class="a" d="M600 190H770"><animate attributeName="stroke" values="#475569;#16a34a;#475569" dur="4s" repeatCount="indefinite"/></path><path class="r" d="M900 235C1030 350 770 350 840 235"><animate attributeName="stroke-dashoffset" values="0;36" dur="1.5s" repeatCount="indefinite"/></path><text class="t" x="780" y="370">self-invocation stays on the target: proxy advice does not run again</text></svg>
