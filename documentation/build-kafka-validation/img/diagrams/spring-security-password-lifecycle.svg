<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Password encoding matching and upgrade lifecycle</title><desc id="desc">Registration encodes and stores a salted hash. Login matches a raw password to the stored hash without decoding it. A successful login can trigger an explicit encoding upgrade.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L8 3Z" fill="#64748b"/></marker><style>.bg{fill:#f8fafc}.title{font:700 34px Arial;fill:#0f172a}.sub{font:400 17px Arial;fill:#475569}.lane{font:700 15px Arial;fill:#334155;letter-spacing:1px}.box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:16}.blue{fill:#eff6ff;stroke:#60a5fa}.green{fill:#f0fdf4;stroke:#4ade80}.amber{fill:#fffbeb;stroke:#fbbf24}.red{fill:#fff1f2;stroke:#fb7185}.head{font:700 17px Arial;fill:#0f172a}.txt{font:400 14px Arial;fill:#475569}.mono{font:700 14px Consolas,monospace;fill:#334155}.arr{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#a)}.no{font:700 20px Arial;fill:#e11d48}</style></defs>
  <rect class="bg" width="1400" height="760"/><text x="60" y="62" class="title">Password Lifecycle: Encode, Match, Upgrade—Never Decode</text><text x="60" y="96" class="sub">The raw password is transient; the database stores only a salted one-way representation</text>
  <text x="60" y="150" class="lane">ACCOUNT CREATION / PASSWORD CHANGE</text>
  <rect x="60" y="176" width="220" height="92" class="box blue"/><text x="84" y="214" class="head">Raw password</text><text x="84" y="242" class="txt">present only in memory</text>
  <rect x="350" y="176" width="260" height="92" class="box amber"/><text x="374" y="214" class="head">PasswordEncoder.encode</text><text x="374" y="242" class="txt">random salt + work factor</text>
  <rect x="680" y="176" width="310" height="92" class="box green"/><text x="704" y="210" class="head">Stored representation</text><text x="704" y="240" class="mono">{bcrypt}$2a$10$...</text>
  <rect x="1060" y="176" width="270" height="92" class="box"/><text x="1084" y="214" class="head">Database</text><text x="1084" y="242" class="txt">stores hash, never raw value</text>
  <path d="M280 222H350" class="arr"/><path d="M610 222H680" class="arr"/><path d="M990 222H1060" class="arr"/>
  <text x="60" y="350" class="lane">LOGIN</text>
  <rect x="60" y="376" width="220" height="92" class="box blue"/><text x="84" y="414" class="head">Submitted raw value</text><text x="84" y="442" class="txt">from form or Basic header</text>
  <rect x="350" y="376" width="330" height="132" class="box amber"/><text x="374" y="414" class="head">PasswordEncoder.matches</text><text x="374" y="444" class="txt">reads algorithm id, salt, parameters</text><text x="374" y="468" class="txt">verifies submitted value against hash</text><text x="374" y="492" class="txt">does not call encode() and compare strings</text>
  <rect x="760" y="376" width="230" height="92" class="box green"/><text x="784" y="414" class="head">true</text><text x="784" y="442" class="txt">authentication continues</text>
  <rect x="1060" y="376" width="270" height="92" class="box red"/><text x="1084" y="414" class="head">false</text><text x="1084" y="442" class="txt">bad credentials</text>
  <path d="M280 422H350" class="arr"/><path d="M680 422H760" class="arr"/><path d="M680 466H720V542H1170V468" class="arr"/>
  <text x="60" y="604" class="lane">POLICY UPGRADE AFTER SUCCESS</text>
  <rect x="60" y="628" width="290" height="82" class="box"/><text x="84" y="662" class="head">upgradeEncoding(hash)?</text><text x="84" y="688" class="txt">Is stored strength now outdated?</text>
  <rect x="430" y="628" width="330" height="82" class="box amber"/><text x="454" y="662" class="head">Explicit re-encode path</text><text x="454" y="688" class="txt">uses successful raw value once</text>
  <rect x="840" y="628" width="300" height="82" class="box green"/><text x="864" y="662" class="head">Save stronger hash</text><text x="864" y="688" class="txt">future logins use new policy</text>
  <path d="M350 669H430" class="arr"/><path d="M760 669H840" class="arr"/>
  <text x="1190" y="665" class="no">NO DECODE</text>
</svg>
