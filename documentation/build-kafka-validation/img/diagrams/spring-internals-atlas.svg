<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc"><title id="title">Spring internals visual atlas</title><desc id="desc">Panels show proxy interception, transaction lifecycle, MVC dispatch, Hibernate flush, connection pools, and Kubernetes shutdown.</desc><style>.bg{fill:#f8fafc}.p{fill:#fff;stroke:#334155;stroke-width:2}.s{fill:#dcfce7;stroke:#15803d;stroke-width:1.5}.b{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5}.y{fill:#fef3c7;stroke:#ca8a04;stroke-width:1.5}.h{font:700 19px system-ui;fill:#0f172a}.t{font:14px system-ui;fill:#334155}.a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#475569"/></marker></defs><rect class="bg" width="1400" height="850"/><text class="h" x="30" y="35">Spring Boot internals — follow the proxy, thread, transaction, entity and connection</text>
<g transform="translate(30 65)"><rect class="p" width="420" height="220" rx="16"/><text class="h" x="20" y="35">1. Proxy interception</text><rect class="b" x="20" y="80" width="90" height="55" rx="8"/><text class="t" x="40" y="112">caller</text><rect class="s" x="155" y="70" width="110" height="75" rx="8"/><text class="t" x="180" y="103">proxy</text><text class="t" x="170" y="125">advice chain</text><rect class="y" x="310" y="80" width="90" height="55" rx="8"/><text class="t" x="330" y="112">target</text><path class="a" d="M110 107H155"/><path class="a" d="M265 107H310"/><path class="a" d="M355 135C355 190 225 190 225 145"/><text class="t" x="245" y="195">self-call bypasses proxy</text></g>
<g transform="translate(490 65)"><rect class="p" width="420" height="220" rx="16"/><text class="h" x="20" y="35">2. Transaction interceptor</text><text class="t" x="25" y="80">metadata → manager → acquire/bind connection</text><path class="a" d="M30 105H390"/><text class="t" x="25" y="140">invoke target → flush/synchronizations</text><path class="a" d="M30 165H390"/><text class="t" x="80" y="205">commit or rollback → unbind/release</text></g>
<g transform="translate(950 65)"><rect class="p" width="420" height="220" rx="16"/><text class="h" x="20" y="35">3. MVC request dispatch</text><text class="t" x="25" y="75">connector queue → filter chain</text><path class="a" d="M30 95H390"/><text class="t" x="25" y="130">DispatcherServlet → mapping → adapter</text><path class="a" d="M30 150H390"/><text class="t" x="25" y="190">argument resolver → controller → converter</text></g>
<g transform="translate(30 325)"><rect class="p" width="420" height="220" rx="16"/><text class="h" x="20" y="35">4. Hibernate unit of work</text><rect class="b" x="25" y="75" width="105" height="65" rx="8"/><text class="t" x="42" y="105">managed</text><text class="t" x="42" y="126">entities</text><rect class="s" x="165" y="75" width="105" height="65" rx="8"/><text class="t" x="182" y="105">dirty</text><text class="t" x="182" y="126">checking</text><rect class="y" x="305" y="75" width="90" height="65" rx="8"/><text class="t" x="322" y="105">action</text><text class="t" x="322" y="126">queue</text><path class="a" d="M130 107H165"/><path class="a" d="M270 107H305"/><text class="t" x="90" y="190">flush orders SQL; commit makes it durable</text></g>
<g transform="translate(490 325)"><rect class="p" width="420" height="220" rx="16"/><text class="h" x="20" y="35">5. Bounded connection pool</text><rect class="b" x="25" y="80" width="90" height="55"/><text class="t" x="43" y="112">requests</text><rect class="y" x="160" y="65" width="110" height="85"/><text class="t" x="180" y="100">wait queue</text><text class="t" x="185" y="125">timeout</text><rect class="s" x="315" y="65" width="80" height="85"/><text class="t" x="330" y="95">4 DB</text><text class="t" x="326" y="120">sessions</text><path class="a" d="M115 107H160"/><path class="a" d="M270 107H315"/><text class="t" x="50" y="195">pool protects capacity; larger is not automatically faster</text></g>
<g transform="translate(950 325)"><rect class="p" width="420" height="220" rx="16"/><text class="h" x="20" y="35">6. Kubernetes shutdown</text><text class="t" x="25" y="75">SIGTERM → readiness false → traffic drains</text><path class="a" d="M30 100H390"/><text class="t" x="25" y="140">pause consumers/schedulers → finish/relinquish</text><path class="a" d="M30 165H390"/><text class="t" x="100" y="205">flush telemetry → close pools → exit</text></g>
<g transform="translate(30 590)"><rect class="p" width="1340" height="190" rx="16"/><text class="h" x="20" y="40">Failure questions</text><text class="t" x="20" y="80">Did the call pass through the proxy? Which thread/context owns the transaction? Where did the request wait? When did Hibernate flush?</text><text class="t" x="20" y="115">How many database sessions can all replicas create? Can shutdown relinquish scheduled claims and Kafka partitions before the grace deadline?</text><text class="t" x="20" y="155">Trace these resources end to end; annotations alone do not prove runtime behavior.</text></g></svg>
