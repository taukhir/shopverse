<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI security layers</title>
  <desc id="desc">Layered security controls for a Spring AI application.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#111827;stroke-width:2;rx:12}.guard{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12}.data{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.model{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;fill:#111827;font-weight:700}.text{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#111827;font-weight:700}.small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;fill:#374151}.line{stroke:#dc2626;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="50" y="52">Secure Spring AI Request Flow</text>
  <text class="small" x="50" y="82">Do not rely on prompts alone. Enforce data and tool access in backend code.</text>
  <rect class="box" x="58" y="150" width="170" height="90"/><text class="text" x="96" y="186">User</text><text class="small" x="84" y="212">JWT / session</text>
  <rect class="guard" x="280" y="150" width="190" height="90"/><text class="text" x="318" y="180">AuthN/AuthZ</text><text class="small" x="312" y="208">roles, scopes, owner</text>
  <rect class="guard" x="522" y="150" width="190" height="90"/><text class="text" x="560" y="180">Input Guard</text><text class="small" x="552" y="208">size, abuse, PII</text>
  <rect class="guard" x="764" y="150" width="190" height="90"/><text class="text" x="798" y="180">Policy Router</text><text class="small" x="800" y="208">allowed intents</text>
  <rect class="data" x="400" y="330" width="220" height="110"/><text class="text" x="438" y="366">Authorized RAG</text><text class="small" x="430" y="394">metadata filters</text><text class="small" x="430" y="416">tenant/user/role scope</text>
  <rect class="guard" x="700" y="330" width="220" height="110"/><text class="text" x="738" y="366">Tool Gateway</text><text class="small" x="730" y="394">allowlist + validation</text><text class="small" x="730" y="416">read-only first</text>
  <rect class="model" x="520" y="525" width="220" height="90"/><text class="text" x="576" y="562">LLM</text><text class="small" x="550" y="590">receives least data</text>
  <rect class="guard" x="820" y="525" width="220" height="90"/><text class="text" x="852" y="562">Output Guard</text><text class="small" x="850" y="590">validate, redact, log</text>
  <path class="line" d="M 228 195 L 280 195"/><path class="line" d="M 470 195 L 522 195"/><path class="line" d="M 712 195 L 764 195"/><path class="line" d="M 850 240 C 800 285 700 315 620 355"/><path class="line" d="M 860 240 C 870 285 860 310 850 330"/><path class="line" d="M 510 440 L 590 525"/><path class="line" d="M 810 440 L 675 525"/><path class="line" d="M 740 570 L 820 570"/>
  <text class="small" x="58" y="662">Key idea: authorization happens before retrieval and before every tool call. The model should never receive data the user is not allowed to see.</text>
</svg>
