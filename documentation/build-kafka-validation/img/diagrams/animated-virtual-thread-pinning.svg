<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc"><title id="title">Virtual thread mount, unmount, and pinning animation</title><desc id="desc">A virtual thread moves onto a carrier, unmounts during supported blocking, then remains pinned when blocking inside a monitor.</desc><style>.bg{fill:#f8fafc}.c{fill:#dcfce7;stroke:#15803d;stroke-width:2}.v{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.pin{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.h{font:700 19px system-ui;fill:#0f172a}.t{font:14px system-ui;fill:#334155}</style><rect class="bg" width="1100" height="430"/><text class="h" x="30" y="38">Virtual-thread lifecycle: mount → supported blocking unmounts → monitor blocking can pin</text><rect class="c" x="420" y="175" width="260" height="110" rx="18"/><text class="h" x="470" y="220">Carrier thread</text><text class="t" x="475" y="250">scarce platform thread</text><rect class="v" x="70" y="85" width="210" height="85" rx="16"><animate attributeName="x" values="70;440;70;440" dur="8s" repeatCount="indefinite"/></rect><text class="h" x="105" y="120">Virtual thread A</text><text class="t" x="105" y="145">mount / unmount</text><rect class="pin" x="790" y="250" width="230" height="90" rx="16"><animate attributeName="opacity" values="0.25;0.25;1;1" dur="8s" repeatCount="indefinite"/></rect><text class="h" x="825" y="285">Pinned operation</text><text class="t" x="820" y="315">blocking while monitor held</text><path d="M680 230H790" stroke="#475569" stroke-width="3"/><text class="t" x="50" y="390">Animation is conceptual. Confirm pinning and carrier occupation with JFR on the deployed JDK.</text></svg>
