<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc"><title id="title">Spring bean creation lifecycle</title><desc id="desc">Bean definitions are processed before instantiation, then dependencies, callbacks, post processors and proxies lead to a ready bean and destruction callbacks.</desc><defs><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#334155;stroke-width:2}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.amber{fill:#fef3c7;stroke:#d97706}.t{font:18px sans-serif;fill:#0f172a}.h{font:bold 24px sans-serif;fill:#0f172a}.a{stroke:#475569;stroke-width:3;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#475569"/></marker></defs><rect class="bg" width="1200" height="500" rx="18"/><text class="h" x="40" y="46">Definition phase</text><rect class="b blue" x="40" y="75" width="320" height="90" rx="12"/><text class="t" x="65" y="112">BeanDefinition registry/factory</text><text class="t" x="65" y="140">post-processors modify metadata</text><path class="a" d="M360 120h90"/><text class="h" x="450" y="46">Instance phase</text><rect class="b" x="450" y="75" width="190" height="90" rx="12"/><text class="t" x="492" y="112">instantiate</text><text class="t" x="475" y="140">constructor chosen</text><path class="a" d="M640 120h55"/><rect class="b" x="695" y="75" width="210" height="90" rx="12"/><text class="t" x="735" y="112">populate</text><text class="t" x="720" y="140">dependencies/properties</text><path class="a" d="M905 120h55"/><rect class="b amber" x="960" y="75" width="200" height="90" rx="12"/><text class="t" x="985" y="112">aware callbacks</text><text class="t" x="985" y="140">context metadata</text><path class="a" d="M1060 165v75"/><rect class="b" x="850" y="240" width="310" height="90" rx="12"/><text class="t" x="875" y="277">before-init processors → init</text><text class="t" x="875" y="305">→ after-init processors</text><path class="a" d="M850 285h-80"/><rect class="b green" x="470" y="240" width="300" height="90" rx="12"/><text class="t" x="500" y="277">ready bean or proxy</text><text class="t" x="500" y="305">published singleton identity</text><path class="a" d="M620 330v75"/><rect class="b amber" x="470" y="405" width="300" height="70" rx="12"/><text class="t" x="505" y="447">context close → destroy</text></svg>
