spring:
  datasource:
    url: jdbc:h2:mem:shopverse-labs;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.generate_statistics: true
    open-in-view: false
  cache:
    type: simple

resilience4j:
  retry:
    instances:
      inventory:
        max-attempts: 3
        wait-duration: 1ms

labs:
  security:
    enabled: false
  kafka:
    enabled: false
