databaseChangeLog:
  - changeSet:
      id: 007-remove-demo-orders
      author: shopverse
      changes:
        - sql:
            sql: |
              DELETE FROM order_timeline_events
              WHERE order_number LIKE 'DEMO-ORD-%';

              DELETE FROM order_items
              WHERE order_id IN (
                SELECT id FROM orders WHERE order_number LIKE 'DEMO-ORD-%'
              );

              DELETE FROM orders
              WHERE order_number LIKE 'DEMO-ORD-%';
