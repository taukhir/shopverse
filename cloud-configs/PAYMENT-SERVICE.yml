server:
  port: ${SERVER_PORT:8084}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/payment_service}
    username: ${DB_USERNAME:ahmed}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
  cache:
    type: simple
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/auth/.well-known/jwks.json}

security:
  jwt:
    issuer: ${JWT_ISSUER:shopverse-auth-service}

shopverse:
  payment-service:
    health-checkup:
      message: ${PAYMENT_SERVICE_HEALTH_CHECKUP_MESSAGE:Payment service is running}
  payment:
    approval-limit: ${PAYMENT_APPROVAL_LIMIT:10000.00}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh

resilience4j:
  ratelimiter:
    instances:
      payment-api:
        limit-for-period: ${PAYMENT_RATE_LIMIT:100}
        limit-refresh-period: 1s
        timeout-duration: 0
  bulkhead:
    instances:
      payment-api:
        max-concurrent-calls: ${PAYMENT_MAX_CONCURRENT_CALLS:100}
        max-wait-duration: 0
