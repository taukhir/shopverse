eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:true}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

spring:
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:50}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: ${KAFKA_PRODUCER_LINGER_MS:5}
        compression.type: ${KAFKA_PRODUCER_COMPRESSION_TYPE:lz4}
    listener:
      observation-enabled: true
      ack-mode: record
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:1}

shopverse:
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:25}
    publish-delay-ms: ${OUTBOX_PUBLISH_DELAY_MS:1000}
    send-timeout-seconds: ${OUTBOX_SEND_TIMEOUT_SECONDS:10}
    claim-timeout-ms: ${OUTBOX_CLAIM_TIMEOUT_MS:30000}
  logging:
    health-file: ${HEALTH_LOG_FILE:logs/${spring.application.name}-health.log}
  kafka:
    topics:
      order-created: ${ORDER_CREATED_TOPIC:shopverse.order.created}
      inventory-reserved: ${INVENTORY_RESERVED_TOPIC:shopverse.inventory.reserved}
      inventory-failed: ${INVENTORY_FAILED_TOPIC:shopverse.inventory.failed}
      payment-completed: ${PAYMENT_COMPLETED_TOPIC:shopverse.payment.completed}
      payment-failed: ${PAYMENT_FAILED_TOPIC:shopverse.payment.failed}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  include-application-name: false
  file:
    name: ${LOG_FILE:logs/${spring.application.name}.log}
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  structured:
    format:
      console: ${STRUCTURED_LOG_FORMAT:logstash}
      file: ${STRUCTURED_LOG_FORMAT:logstash}
    json:
      add:
        application: ${spring.application.name}
        environment: ${APP_ENVIRONMENT:local}
