server:
  port: ${SERVER_PORT:8082}

spring:
  liquibase:
    enabled: ${USER_SERVICE_LIQUIBASE_ENABLED:true}
    change-log: ${USER_SERVICE_LIQUIBASE_CHANGELOG:classpath:db/changelog/db.changelog-master.yml}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/user_service}
    username: ${DB_USERNAME:ahmed}
    password: ${DB_PASSWORD:Ahm3d@123}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
    show-sql: ${JPA_SHOW_SQL:false}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/auth/.well-known/jwks.json}

security:
  jwt:
    issuer: ${JWT_ISSUER:shopverse-auth-service}

logging:
  level:
    org.springframework.boot.autoconfigure.liquibase: ${LIQUIBASE_LOG_LEVEL:INFO}
    liquibase: ${LIQUIBASE_LOG_LEVEL:INFO}

shopverse:
  user-service:
    health-checkup:
      message: ${USER_SERVICE_HEALTH_CHECKUP_MESSAGE:User service is running}

resilience4j:
  ratelimiter:
    instances:
      user-service-api-rate-limiter:
        limit-for-period: ${RATE_LIMIT_BURST_CAPACITY:120}
        limit-refresh-period: ${RATE_LIMIT_REFRESH_PERIOD:60s}
        timeout-duration: ${RATE_LIMIT_TIMEOUT_DURATION:0}
  bulkhead:
    instances:
      user-service-api-bulkhead:
        max-concurrent-calls: ${BULKHEAD_MAX_CONCURRENT_REQUESTS:100}
        max-wait-duration: ${BULKHEAD_MAX_WAIT_DURATION:0}
  retry:
    instances:
      user-service-lookup-retry:
        max-attempts: ${LOOKUP_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${LOOKUP_RETRY_WAIT_DURATION:100ms}
