server:
  port: ${SERVER_PORT:8086}

shopverse:
  kafka-recovery:
    service-name: inventory
  inventory:
    reservation-ttl: ${INVENTORY_RESERVATION_TTL:5m}
    expiry-scan-delay-ms: ${INVENTORY_EXPIRY_SCAN_DELAY_MS:60000}
  inventory-service:
    health-checkup:
      message: ${INVENTORY_SERVICE_HEALTH_CHECKUP_MESSAGE:Inventory service is running}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/inventory_service}
    username: ${DB_USERNAME:ahmed}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
  cache:
    type: simple
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/auth/.well-known/jwks.json}

security:
  jwt:
    issuer: ${JWT_ISSUER:shopverse-auth-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,refresh

resilience4j:
  ratelimiter:
    instances:
      inventory-api:
        limit-for-period: ${INVENTORY_RATE_LIMIT:150}
        limit-refresh-period: 1s
        timeout-duration: 0
  bulkhead:
    instances:
      inventory-api:
        max-concurrent-calls: ${INVENTORY_MAX_CONCURRENT_CALLS:100}
        max-wait-duration: 0
