server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: CircuitBreaker
              args:
                name: gateway-downstream
            - name: Retry
              args:
                retries: 2
                methods:
                  - GET
                statuses:
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/v1/payments/**
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventory/**
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/users/**,/api/v1/cart/**,/api/v1/roles/**,/api/v1/permissions/**,/api/v1/admin/**
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/auth/.well-known/jwks.json}

security:
  jwt:
    issuer: ${JWT_ISSUER:shopverse-auth-service}

shopverse:
  readiness:
    timeout: ${SHOPVERSE_READINESS_TIMEOUT:3s}
    minimum-catalog-products: ${SHOPVERSE_READINESS_MINIMUM_CATALOG_PRODUCTS:5}
    minio-object-base-url: ${SHOPVERSE_READINESS_MINIO_OBJECT_BASE_URL:}
    required-services:
      - AUTH-SERVICE
      - USER-SERVICE
      - ORDER-SERVICE
      - PAYMENT-SERVICE
      - INVENTORY-SERVICE
    required-route-ids:
      - auth-service
      - user-service
      - order-service
      - payment-service
      - inventory-service

resilience4j:
  circuitbreaker:
    instances:
      gateway-downstream:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  timelimiter:
    instances:
      gateway-downstream:
        timeout-duration: 5s
        cancel-running-future: true
